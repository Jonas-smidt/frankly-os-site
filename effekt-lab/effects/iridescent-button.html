<!doctype html>
<html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iriserende knap · frankly</title>
<style>
  :root{
    --bordeaux:#2D0011; --rose:#FF6FA5; --calm:#FFD3E3; --blush:#FFF6FA;
    --sans:"Switzer",system-ui,-apple-system,"Segoe UI",sans-serif;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    background:radial-gradient(65% 60% at 50% 36%, #23000d 0%, #150008 55%, #0a0004 100%);
    display:grid;place-items:center;overflow:hidden;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(38% 26% at 50% 10%, rgba(255,140,190,.10), transparent 70%)}

  .stage{position:relative;width:min(780px,88vw);aspect-ratio:780/300;display:grid;place-items:center}

  /* ---- dark glossy glass pill (the base you see when no light is over it) ---- */
  .pill{
    position:relative;width:100%;height:72%;border-radius:999px;overflow:hidden;isolation:isolate;
    background:
      linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0) 20%),
      linear-gradient(180deg, #1e0a14 0%, #120610 58%, #1b0813 100%);
    box-shadow:
      0 0 var(--bloom,34px) rgba(255,110,170,.30),
      0 26px 74px rgba(0,0,0,.66),
      inset 0 1.5px 0 rgba(255,255,255,.5),
      inset 0 0 0 1px rgba(255,255,255,.08),
      inset 0 -12px 26px rgba(0,0,0,.55);
    animation:bloom 5s ease-in-out infinite;
  }

  /* ---- the iridescent light BAND that flows through the glass ---- */
  .band{
    position:absolute;top:-15%;left:0;height:130%;width:62%;
    mix-blend-mode:screen;filter:blur(1.5px) saturate(1.3) brightness(1.05);
    /* real spectral oil-slick across the band, hot white core */
    background:linear-gradient(100deg,
      rgba(120,70,255,0) 0%,
      #7A3CFF 10%,
      #3E7BFF 22%,
      #22D6E6 33%,
      #CFFBFF 43%,
      #FFFFFF 50%,
      #FFE7A6 57%,
      #FF9CC0 67%,
      #FF5FA5 78%,
      #C21E63 90%,
      rgba(194,30,99,0) 100%);
    /* feather both ends so the band reads as a moving beam, not a wall */
    -webkit-mask:linear-gradient(90deg,transparent 0%,#000 22%,#000 78%,transparent 100%);
            mask:linear-gradient(90deg,transparent 0%,#000 22%,#000 78%,transparent 100%);
    animation:sweep 5s var(--ease) infinite;
  }
  /* fine oil-slick striations riding on the band */
  .stri{
    position:absolute;top:-15%;left:0;height:130%;width:62%;mix-blend-mode:screen;opacity:.45;
    background:repeating-linear-gradient(98deg,rgba(255,255,255,0) 0 5px,rgba(255,255,255,.22) 5px 6px,rgba(255,255,255,0) 6px 11px);
    -webkit-mask:linear-gradient(90deg,transparent 0%,#000 30%,#000 70%,transparent 100%);
            mask:linear-gradient(90deg,transparent 0%,#000 30%,#000 70%,transparent 100%);
    animation:sweep 5s var(--ease) infinite;
  }
  /* bright glass top gloss (always on) */
  .gloss{position:absolute;left:5%;right:5%;top:5%;height:30%;border-radius:999px;z-index:2;
    background:linear-gradient(180deg,rgba(255,255,255,.4),rgba(255,255,255,0));filter:blur(2px);opacity:.6;pointer-events:none}

  .label{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;gap:.5ch;
    color:#fff;font-weight:600;font-size:clamp(24px,4.4vw,40px);letter-spacing:-.01em;text-shadow:0 1px 12px rgba(0,0,0,.55)}
  .label .plus{font-weight:400;opacity:.92}

  .cursor{position:absolute;right:15%;bottom:4%;width:26px;height:26px;z-index:4;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.7));animation:curs 5s ease-in-out infinite}
  @keyframes curs{0%,100%{transform:translate(0,0)}45%{transform:translate(-7px,-5px)}}

  .grain{position:fixed;inset:0;pointer-events:none;opacity:.055;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

  /* enter L → fill → exit R → EMPTY → enter R → fill → exit L(=start), seamless */
  @keyframes sweep{
    0%   {transform:translateX(-105%)}
    22%  {transform:translateX(-2%)}
    42%  {transform:translateX(78%)}
    50%  {transform:translateX(115%)}   /* fully off → pill dark */
    58%  {transform:translateX(115%)}
    78%  {transform:translateX(2%)}
    100% {transform:translateX(-105%)}
  }
  @keyframes bloom{0%,50%,100%{--bloom:26px}22%,78%{--bloom:88px}}

  .back{position:fixed;top:18px;left:18px;z-index:9;color:#f4d9e4;text-decoration:none;
    font-size:13px;font-weight:500;padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .cap{position:fixed;left:0;right:0;bottom:20px;text-align:center;color:#c9a7b6;font-size:12px}
  .cap b{color:#f0d7e2;font-weight:600}
  @media(prefers-reduced-motion:reduce){.band,.stri,.pill,.cursor{animation:none}.band,.stri{transform:translateX(-2%)}}
</style><style>
@font-face{font-family:"Almarena Neue Display";font-weight:600 700;font-display:swap;src:url("/effekt-lab/fonts/AlmarenaNeue-Ds-SemiBold.woff2") format("woff2")}
@font-face{font-family:"Switzer";font-weight:400;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Regular.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:500;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Medium.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:600;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Semibold.otf") format("opentype")}
</style>
</head>
<body>
  <a class="back" href="../index.html">← Oversigt</a>
  <div class="stage">
    <div class="pill">
      <div class="band"></div>
      <div class="stri"></div>
      <div class="gloss"></div>
      <div class="label"><span class="plus">+</span> Tilføj ny</div>
      <svg class="cursor" viewBox="0 0 24 24" fill="#fff"><path d="M4 2l14 8-6 1.5L15 18l-2.5 1L9 12l-5 4z"/></svg>
    </div>
  </div>
  <div class="grain"></div>
  <div class="cap">Iriserende knap · efter <b>Iridescent Button Motion</b></div>
</body></html>
