<!doctype html>
<html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glas-sfære · frankly</title>
<style>
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{background:#050207;overflow:hidden;font-family:"Switzer",system-ui,-apple-system,"Segoe UI",sans-serif;
    display:grid;place-items:center}
  .stage{position:fixed;inset:0;display:grid;place-items:center;
    background:radial-gradient(60% 50% at 50% 44%, #14060f 0%, #0a0309 55%, #040106 100%)}
  .sphere{position:relative;width:min(66vmin,560px);height:min(66vmin,560px);border-radius:50%;
    animation:bob 9s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-1.4%) scale(1.006)}}
  canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;
    /* clip nebula into the glass ball with a soft edge */
    -webkit-mask:radial-gradient(closest-side,#000 0 96%,transparent 99%);
            mask:radial-gradient(closest-side,#000 0 96%,transparent 99%)}
  /* fresnel rim darkening + inner shadow for glass depth */
  .fresnel{position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:radial-gradient(closest-side, transparent 62%, rgba(0,0,0,.35) 86%, rgba(0,0,0,.7) 99%);
    box-shadow:inset 0 0 60px rgba(0,0,0,.6)}
  /* bright refractive rim */
  .rim{position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:
      radial-gradient(closest-side, transparent 90%, rgba(255,220,235,.5) 96%, rgba(255,150,195,.15) 99%, transparent);
    mix-blend-mode:screen}
  /* prism chromatic edge glints */
  .prism{position:absolute;inset:0;border-radius:50%;pointer-events:none;mix-blend-mode:screen;opacity:.7;
    background:conic-gradient(from 30deg, transparent 0 8%, rgba(120,120,255,.35) 12%, transparent 18%,
      transparent 46%, rgba(255,120,180,.4) 52%, transparent 60%,
      transparent 74%, rgba(120,220,255,.3) 80%, transparent 88%);
    -webkit-mask:radial-gradient(closest-side, transparent 88%, #000 95%, transparent 100%);
            mask:radial-gradient(closest-side, transparent 88%, #000 95%, transparent 100%);
    filter:blur(.5px);animation:spin 26s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* strong top-left specular crescent (the money detail) */
  .spec{position:absolute;inset:0;border-radius:50%;pointer-events:none;mix-blend-mode:screen}
  /* soft elongated specular streak near the upper-left rim (a glass reflection) */
  .spec::before{content:"";position:absolute;left:20%;top:15%;width:30%;height:15%;border-radius:50%;
    transform:rotate(-30deg);
    background:radial-gradient(closest-side, rgba(255,255,255,.85), rgba(255,255,255,.28) 52%, transparent 78%);
    filter:blur(4px)}
  .spec::after{content:"";position:absolute;left:30%;top:19%;width:7%;height:5%;border-radius:50%;
    background:radial-gradient(circle,#fff,transparent 70%);filter:blur(1px);opacity:.85}
  /* soft outer glow of the ball */
  .glow{position:absolute;inset:-14%;border-radius:50%;pointer-events:none;z-index:-1;
    background:radial-gradient(closest-side, rgba(180,40,110,.28), transparent 70%);filter:blur(20px)}

  .grain{position:fixed;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  .back{position:fixed;top:20px;left:20px;z-index:9;color:#f4d9e4;text-decoration:none;font-size:13px;font-weight:500;
    padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .cap{position:fixed;left:0;right:0;bottom:22px;text-align:center;color:#c9a7b6;font-size:12px}
  .cap b{color:#f0d7e2;font-weight:600}
</style><style>
@font-face{font-family:"Almarena Neue Display";font-weight:600 700;font-display:swap;src:url("/effekt-lab/fonts/AlmarenaNeue-Ds-SemiBold.woff2") format("woff2")}
@font-face{font-family:"Switzer";font-weight:400;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Regular.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:500;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Medium.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:600;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Semibold.otf") format("opentype")}
</style>
</head>
<body>
  <a class="back" href="../index.html">← Oversigt</a>
  <div class="stage">
    <div class="sphere">
      <div class="glow"></div>
      <canvas id="c" width="620" height="620"></canvas>
      <div class="fresnel"></div>
      <div class="prism"></div>
      <div class="rim"></div>
      <div class="spec"></div>
    </div>
  </div>
  <div class="grain"></div>
  <div class="cap">Glas-sfære · efter <b>Glassy Space Sphere</b></div>

  <script>
    const cv=document.getElementById('c'),x=cv.getContext('2d'),W=620,H=620,CX=310,CY=310,R=300;
    // stars fixed in the rotating field
    const stars=[];for(let i=0;i<230;i++){const a=Math.random()*6.283,r=Math.sqrt(Math.random())*R;
      stars.push({x:Math.cos(a)*r,y:Math.sin(a)*r,s:Math.random()*1.5+.3,t:Math.random()*6.283,tw:Math.random()*2+1});}
    // nebula cloud blobs (bordeaux -> magenta) + a soft blush core
    const clouds=[
      {x:-40,y:20,r:210,c:'rgba(138,31,74,0.55)'},
      {x:70,y:-60,r:170,c:'rgba(90,20,60,0.5)'},
      {x:20,y:60,r:150,c:'rgba(190,40,110,0.4)'},
      {x:-90,y:-40,r:120,c:'rgba(60,10,40,0.6)'},
    ];
    function frame(t){
      const rot=t*0.00006;
      x.clearRect(0,0,W,H);
      x.save();x.translate(CX,CY);x.rotate(rot);
      // deep space base
      x.fillStyle='#0a0208';x.beginPath();x.arc(0,0,R,0,6.283);x.fill();
      // nebula clouds
      x.globalCompositeOperation='lighter';
      for(const c of clouds){const g=x.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
        g.addColorStop(0,c.c);g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;
        x.beginPath();x.arc(c.x,c.y,c.r,0,6.283);x.fill();}
      // soft galactic core (blush/rose) — diffuse, NOT a hot pixel
      const core=x.createRadialGradient(-10,0,0,-10,0,150);
      core.addColorStop(0,'rgba(255,230,242,0.85)');core.addColorStop(.18,'rgba(255,150,200,0.6)');
      core.addColorStop(.5,'rgba(190,40,110,0.28)');core.addColorStop(1,'rgba(0,0,0,0)');
      x.fillStyle=core;x.beginPath();x.arc(-10,0,150,0,6.283);x.fill();
      // stars
      for(const s of stars){const tw=.55+.45*Math.sin(t*0.002*s.tw+s.t);
        x.globalAlpha=tw;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,s.s,0,6.283);x.fill();}
      x.globalAlpha=1;x.restore();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body></html>
