<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo-reveal · Frankly Effekt-lab</title>
<link rel="stylesheet" href="../assets/frankly-brand.css">
<style>
  :root{
    --punch:cubic-bezier(.72,0,.86,0);      /* violent ease-in accel */
    --brake:cubic-bezier(.16,1,.3,1);       /* hard decel / settle */
    --smooth:cubic-bezier(.22,.61,.36,1);
    --loop:6.6s;
    --near-white:#FBF7F4;
  }

  html,body{height:100%}
  body{margin:0;background:#080205;overflow:hidden}

  /* ---- stage : dark near-black bordeaux ---- */
  .stage{
    position:fixed; inset:0;
    display:grid; place-items:center;
    background:
      radial-gradient(120% 100% at 50% 42%, #1d0511 0%, #12030b 46%, #090206 78%, #050103 100%);
    isolation:isolate;
  }

  .reveal{
    position:relative;
    width:min(600px,86vw); height:min(340px,60vh);
    display:grid;
  }
  .reveal>*{ grid-area:1/1; place-self:center; }

  /* ---- the leaf monogram (punch-zoom hero) ---- */
  .mono{
    width:132px; height:auto;
    transform:scale(.12); opacity:.32;
    will-change:transform,opacity,filter;
    animation:mono var(--loop) linear infinite;
  }
  .mono svg{display:block;width:100%;height:auto}
  .mono svg path{ fill:#F7F3EF; }

  /* ---- lockup : wordmark + chromatic ghosts + glow + swoosh ---- */
  .lockup{ display:grid; }
  .lockup>*{ grid-area:1/1; place-self:center; }

  .wm{ width:min(520px,66vw); height:auto; }
  .wm svg{display:block;width:100%;height:auto}

  .wm-base{ z-index:3; opacity:0; transform:scale(1.14); filter:blur(10px);
    will-change:transform,opacity,filter;
    animation:wm var(--loop) linear infinite; }
  .wm-base svg path{ fill:var(--near-white); }

  /* chromatic split ghosts — Frankly prism, not RGB */
  .wm-r,.wm-l{ z-index:2; opacity:0; mix-blend-mode:screen; will-change:transform,opacity; }
  .wm-r svg path{ fill:#FF6FA5; }
  .wm-l svg path{ fill:#FFACCA; }
  .wm-r{ animation:ghostR var(--loop) linear infinite; }
  .wm-l{ animation:ghostL var(--loop) linear infinite; }

  /* ---- prismatic bloom (hot white core + prism band) ---- */
  .glow{ z-index:1; width:min(560px,72vw); height:190px; opacity:0;
    transform:scale(.7); pointer-events:none; will-change:transform,opacity;
    display:grid; animation:bloom var(--loop) linear infinite; }
  .glow-core,.glow-prism{ grid-area:1/1; width:100%; height:100%; border-radius:999px; }
  .glow-prism{
    background:var(--prism); filter:blur(44px) saturate(1.25);
    mix-blend-mode:screen; opacity:.9;
  }
  .glow-core{
    background:radial-gradient(60% 70% at 50% 50%, rgba(255,252,250,.95), rgba(255,175,202,.35) 45%, transparent 72%);
    filter:blur(26px); mix-blend-mode:screen;
  }

  /* ---- swoosh accent stroke ---- */
  .swoosh{ z-index:4; width:min(600px,78vw); height:auto; overflow:visible;
    opacity:0; will-change:stroke-dashoffset,opacity;
    animation:swoosh var(--loop) linear infinite; }
  .swoosh path{
    fill:none; stroke:url(#swGrad); stroke-width:3.2; stroke-linecap:round;
    stroke-dasharray:100; stroke-dashoffset:100;
    filter:drop-shadow(0 0 6px rgba(255,111,165,.65));
  }

  /* ---- exposure flash covering the punch-through cut ---- */
  .flash{
    position:absolute; inset:-20%; z-index:5; opacity:0; pointer-events:none;
    background:radial-gradient(38% 46% at 50% 50%, rgba(255,255,255,.95), rgba(255,175,202,.4) 40%, transparent 70%);
    mix-blend-mode:screen; will-change:opacity;
    animation:flash var(--loop) linear infinite;
  }

  /* ---- grain (anti-banding) + vignette ---- */
  .grain{ position:absolute; inset:0; z-index:8; opacity:.05; mix-blend-mode:overlay; pointer-events:none; }
  .grain svg{width:100%;height:100%}
  .vignette{ position:absolute; inset:0; z-index:7; pointer-events:none;
    background:radial-gradient(130% 120% at 50% 45%, transparent 52%, rgba(0,0,0,.5) 100%); }

  /* ---- keyframes ---- */
  @keyframes mono{
    0%   { transform:scale(.12); opacity:.32; filter:brightness(.92) blur(0); }
    9%   { transform:scale(.125);opacity:.42; animation-timing-function:var(--smooth); }
    15%  { transform:scale(.135);opacity:.6;  filter:brightness(1.1) blur(0); animation-timing-function:var(--punch); }
    26%  { transform:scale(2.4); opacity:1;   filter:brightness(1.7) blur(5px); }
    31%  { transform:scale(6.8); opacity:1;   filter:brightness(2.4) blur(20px); animation-timing-function:var(--punch); }
    36%  { transform:scale(13);  opacity:0;   filter:brightness(3) blur(40px); }
    55%  { transform:scale(.12); opacity:0;   filter:brightness(.92) blur(0); }
    90%  { transform:scale(.12); opacity:0;   animation-timing-function:var(--smooth); }
    100% { transform:scale(.12); opacity:.32; filter:brightness(.92) blur(0); }
  }

  @keyframes wm{
    0%,30% { opacity:0; transform:scale(1.14); filter:blur(10px); }
    34%    { opacity:0; transform:scale(1.1);  filter:blur(7px); animation-timing-function:var(--brake); }
    44%    { opacity:1; transform:scale(1.0);  filter:blur(0); }
    48%    { transform:scale(.99); animation-timing-function:var(--smooth); }   /* micro overshoot */
    53%    { opacity:1; transform:scale(1); }
    80%    { opacity:1; transform:scale(1); filter:blur(0); animation-timing-function:var(--smooth); }
    92%    { opacity:.42; transform:scale(1.015); filter:blur(1.4px); }
    100%   { opacity:0; transform:scale(1.14); filter:blur(10px); }
  }

  @keyframes ghostR{
    0%,36% { opacity:0; transform:translateX(0); }
    40%    { opacity:.9; transform:translateX(18px); animation-timing-function:var(--brake); }
    50%    { opacity:.7; transform:translateX(7px); }
    60%    { opacity:0; transform:translateX(0); }
    100%   { opacity:0; transform:translateX(0); }
  }
  @keyframes ghostL{
    0%,36% { opacity:0; transform:translateX(0); }
    40%    { opacity:.9; transform:translateX(-18px); animation-timing-function:var(--brake); }
    50%    { opacity:.7; transform:translateX(-7px); }
    60%    { opacity:0; transform:translateX(0); }
    100%   { opacity:0; transform:translateX(0); }
  }

  @keyframes bloom{
    0%,34% { opacity:0; transform:scale(.7); }
    39%    { opacity:.4; transform:scale(.92); animation-timing-function:var(--brake); }
    47%    { opacity:1; transform:scale(1.14); }
    55%    { opacity:.82; transform:scale(1.0); animation-timing-function:var(--smooth); }
    74%    { opacity:.32; transform:scale(1); }
    89%    { opacity:0; transform:scale(.96); }
    100%   { opacity:0; }
  }

  @keyframes swoosh{
    0%,36% { opacity:0; stroke-dashoffset:100; }
    40%    { opacity:1; animation-timing-function:var(--brake); }
    51%    { opacity:1; stroke-dashoffset:0; }
    76%    { opacity:1; stroke-dashoffset:0; }
    89%    { opacity:0; stroke-dashoffset:0; }
    100%   { opacity:0; stroke-dashoffset:100; }
  }

  @keyframes flash{
    0%,25% { opacity:0; }
    30%    { opacity:.9; animation-timing-function:var(--brake); }
    33%    { opacity:.78; }
    43%    { opacity:0; }
    100%   { opacity:0; }
  }

  /* ---- furniture ---- */
  .back{
    position:fixed; top:20px; left:20px; z-index:20;
    display:inline-flex; align-items:center; gap:.5em;
    padding:9px 15px 9px 12px; border-radius:var(--r-pill);
    font-family:var(--sans); font-size:13px; font-weight:500; letter-spacing:-.005em;
    color:rgba(255,240,246,.72); text-decoration:none;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,211,227,.12);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    box-shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.25);
    transition:color .3s var(--smooth), background .3s var(--smooth), transform .3s var(--smooth);
  }
  .back:hover{ color:#fff; background:rgba(255,255,255,.08); }
  .back:active{ transform:scale(.96); }

  .caption{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:20;
    font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.01em;
    color:rgba(255,236,243,.4); white-space:nowrap; text-align:center;
  }
  .caption b{ font-weight:600; color:rgba(255,236,243,.62); }

  /* ---- reduced motion : hold one composed hero frame ---- */
  @media (prefers-reduced-motion:reduce){
    .mono,.flash,.wm-r,.wm-l{ animation:none; opacity:0; }
    .wm-base{ animation:none; opacity:1; transform:scale(1); filter:none; }
    .glow{ animation:none; opacity:.6; transform:scale(1); }
    .swoosh{ animation:none; opacity:.9; }
    .swoosh path{ stroke-dashoffset:0; }
  }
</style>
