<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid glass UI · Frankly Effekt-lab</title>
<link rel="stylesheet" href="../assets/frankly-brand.css">
<style>
  html,body{height:100%}
  body{
    margin:0; overflow:hidden;
    background:
      radial-gradient(120vmax 90vmax at 68% 14%, #1a0410 0%, transparent 55%),
      radial-gradient(90vmax 90vmax at 20% 96%, #14030b 0%, transparent 60%),
      #070206;
    display:grid; place-items:center;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- stage / 3D perspective ---------- */
  .stage{
    position:relative;
    width:min(88vw, 780px);
    aspect-ratio: 1 / 1;
    display:grid; place-items:center;
    perspective: 1600px;
    perspective-origin: 42% 42%;
  }
  .tilt{
    position:relative;
    transform-style:preserve-3d;
    transform: rotateX(7deg) rotateY(-25deg) rotateZ(.4deg);
    animation: drift 12s var(--ease) infinite alternate;
    will-change: transform;
  }
  @keyframes drift{
    from{ transform: rotateX(7deg) rotateY(-25.4deg) rotateZ(.4deg) translateY(-2px); }
    to  { transform: rotateX(6.2deg) rotateY(-23.2deg) rotateZ(.1deg) translateY(2px); }
  }

  /* contact shadow cast under the floating panel */
  .contact{
    position:absolute; left:50%; top:60%;
    width:78%; height:42%;
    transform: translate(-50%,-50%) rotateX(64deg) translateZ(-70px);
    background: radial-gradient(closest-side, rgba(0,0,0,.72), transparent 72%);
    filter: blur(26px);
    z-index:0; pointer-events:none;
  }

  /* ---------- the glass toolbar panel (melt hero) ---------- */
  .panel{
    position:relative; z-index:2;
    width: 480px;
    padding: 16px;
    border-radius: 26px;
    display:flex; flex-direction:column; gap:14px;
    --melt-blur: 0px;
    --melt-chroma: 0;
    background:
      linear-gradient(157deg, rgba(38,10,20,.72) 0%, rgba(14,4,9,.90) 48%, rgba(8,2,6,.94) 100%);
    box-shadow:
      0 46px 90px -24px rgba(0,0,0,.85),
      0 22px 44px -14px rgba(45,0,17,.55),
      0 0 30px rgba(255,172,202,.05),
      inset 0 0 0 1px rgba(255,255,255,.10),
      inset 0 1.5px 0 0 rgba(255,255,255,.20),
      inset 0 -1px 1px 0 rgba(0,0,0,.5),
      inset 0 0 30px rgba(255,255,255,.03);
    filter: url(#liquid) blur(var(--melt-blur));
    will-change: filter;
    -webkit-font-smoothing:antialiased;
  }
  /* top specular sheen on the glossy black glass */
  .panel::after{
    content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:
      radial-gradient(140% 80% at 8% -10%, rgba(255,255,255,.14), transparent 40%),
      linear-gradient(180deg, rgba(255,255,255,.05), transparent 22%);
    mix-blend-mode:screen;
    z-index:6;
  }
  /* Frankly-prism chromatic rim — intensifies while liquid */
  .panel::before{
    content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    padding:1.4px;
    background: var(--prism-conic);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    mix-blend-mode:screen;
    opacity: calc(.16 + var(--melt-chroma) * .5);
    filter: blur(.5px) saturate(1.4);
    z-index:5;
  }

  .row{ position:relative; z-index:3; display:flex; align-items:center; }

  /* ---- row 1: canvas menu + tools ---- */
  .r-tools{ gap:12px; }
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    height:40px; padding:0 12px 0 10px;
    border-radius:13px;
    font-family:var(--sans); font-weight:600; font-size:14.5px; letter-spacing:-.005em;
    color:#F3EDEF;
    background: linear-gradient(180deg, rgba(58,20,34,.55), rgba(20,6,12,.72));
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.11),
      inset 0 1px 0 rgba(255,255,255,.18),
      inset 0 -6px 12px -6px rgba(0,0,0,.6),
      0 2px 6px rgba(0,0,0,.4);
  }
  .btn .leaf{ display:block; width:14px; height:auto; color:#FFD3E3; filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
  .btn .chev{ width:11px; height:11px; margin-left:1px; opacity:.6; }
  .tools{ display:flex; align-items:center; gap:4px; margin-left:auto; }
  .tool{
    width:36px; height:36px; border-radius:11px;
    display:grid; place-items:center;
    color: rgba(243,237,239,.62);
  }
  .tool svg{ width:19px; height:19px; display:block; }
  .tool.first{ color: rgba(243,237,239,.9); }

  /* ---- row 2: segmented control ---- */
  .segs{ gap:2px; padding:3px; border-radius:13px;
    background: linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,.14));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), inset 0 2px 5px rgba(0,0,0,.45);
    align-self:flex-start;
  }
  .seg{
    height:34px; padding:0 15px; border-radius:10px;
    display:inline-flex; align-items:center;
    font-family:var(--sans); font-size:14px; font-weight:500; letter-spacing:-.004em;
    color: rgba(243,237,239,.4);
  }
  .seg.on{
    color:#F6F0F2; font-weight:600;
    background: linear-gradient(180deg, rgba(64,22,38,.62), rgba(24,8,14,.75));
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.12),
      inset 0 1px 0 rgba(255,255,255,.2),
      0 2px 6px rgba(0,0,0,.4);
  }

  /* ---- row 3: search ---- */
  .search{
    width:100%; height:44px; border-radius:13px;
    display:flex; align-items:center; gap:10px; padding:0 14px;
    background: linear-gradient(180deg, rgba(0,0,0,.32), rgba(0,0,0,.5));
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.07),
      inset 0 2px 6px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.06);
    color: rgba(243,237,239,.4);
  }
  .search svg{ width:17px; height:17px; opacity:.55; }
  .search span{ font-family:var(--sans); font-size:14.5px; }
  .caret{ width:1.5px; height:18px; margin-left:1px; background:var(--calm-deep);
    border-radius:1px; opacity:.75; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ---------- fixed page furniture ---------- */
  .grain{ position:fixed; inset:0; z-index:9; pointer-events:none; opacity:.06; mix-blend-mode:overlay; }
  .back{
    position:fixed; top:20px; left:20px; z-index:10;
    display:inline-flex; align-items:center; gap:7px;
    height:34px; padding:0 15px; border-radius:var(--r-pill);
    font-family:var(--sans); font-size:13px; font-weight:500; letter-spacing:.005em;
    color: rgba(245,240,241,.72); text-decoration:none;
    background: rgba(255,255,255,.05);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.09);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: color .25s var(--ease), background .25s var(--ease);
  }
  .back:hover{ color:#fff; background: rgba(255,255,255,.09); }
  .caption{
    position:fixed; bottom:22px; left:0; right:0; z-index:10; text-align:center;
    font-family:var(--sans); font-size:12px; letter-spacing:.09em; text-transform:uppercase;
    color: rgba(245,240,241,.32);
  }

  @media (prefers-reduced-motion: reduce){
    .tilt, .caret{ animation:none; }
    .panel{ filter:none; }
  }
  @media (max-width:520px){ .panel{ width: 86vw; } }
</style>

  <!-- grain -->

  <!-- the liquid-melt filter driven by JS -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="liquid" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence id="liquidTurb" type="fractalNoise" baseFrequency="0.006 0.007" numOctaves="2" seed="11" result="turb"/>
      <feDisplacementMap id="liquidDisp" in="SourceGraphic" in2="turb" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

<script>
(function(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce) return;

  const disp  = document.getElementById('liquidDisp');
  const turb  = document.getElementById('liquidTurb');
  const panel = document.querySelector('.panel');

  const SCALE_MAX = 48;
  const FREQ_MIN = 0.006, FREQ_MAX = 0.026;

  // arc (ms):  melted --resolve--> crisp --hold--> crisp --remelt--> melted (loop seam)
  const RESOLVE = 1750, HOLD = 1500, REMELT = 650;
  const PERIOD  = RESOLVE + HOLD + REMELT;

  const easeOut = t => 1 - Math.pow(1 - t, 3);   // settle on resolve
  const easeIn  = t => t * t * t;                // accelerate on re-melt

  let t0 = performance.now();

  function frame(now){
    const e = (now - t0) % PERIOD;
    let m; // melt amount: 1 = fully liquid, 0 = crisp solid glass
    if (e < RESOLVE){
      m = 1 - easeOut(e / RESOLVE);
    } else if (e < RESOLVE + HOLD){
      m = 0;
    } else {
      m = easeIn((e - RESOLVE - HOLD) / REMELT);
    }

    disp.setAttribute('scale', (m * SCALE_MAX).toFixed(2));
    const f = FREQ_MIN + (FREQ_MAX - FREQ_MIN) * m;
    turb.setAttribute('baseFrequency', f.toFixed(4) + ' ' + (f * 1.18).toFixed(4));

    panel.style.setProperty('--melt-blur', (m * 2.1).toFixed(2) + 'px');
    panel.style.setProperty('--melt-chroma', m.toFixed(3));

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
