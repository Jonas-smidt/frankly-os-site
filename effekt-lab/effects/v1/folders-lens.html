<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappe-linse — Frankly Effekt-lab</title>
<link rel="stylesheet" href="../assets/frankly-brand.css">
<style>
  html, body { height: 100%; }
  body{
    margin:0;
    background:
      radial-gradient(130% 100% at 50% 38%, #16020c 0%, #0a050b 52%, #060409 100%);
    color:#fff;
    display:grid;
    place-items:center;
    overflow:hidden;
  }

  /* faint deepening vignette so everything outside the lens falls to black */
  .vignette{
    position:fixed; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(72% 60% at 50% 48%, transparent 34%, rgba(4,3,7,.55) 72%, rgba(4,3,7,.92) 100%);
  }

  /* ---------- the folder list ---------- */
  .field{ position:relative; width:320px; }

  .list{ position:absolute; top:0; left:0; width:320px; user-select:none; }

  .heading{
    font-family:var(--display);
    font-weight:600;
    font-size:19px;
    letter-spacing:-.01em;
    color:rgba(255,255,255,.94);
    padding:4px 14px 16px;
  }

  .row{
    display:flex; align-items:center; gap:11px;
    padding:13px 14px;
    border-radius:14px;
    font-family:var(--sans);
    font-size:16px; font-weight:500; letter-spacing:.1px;
    color:rgba(255,255,255,.52);
  }
  .row .chev{ width:9px; font-size:15px; opacity:.5; line-height:1; }
  .row svg{ flex:none; }

  .row.selected{
    color:#FFE3ED;
    border:1px solid rgba(255,211,227,.34);
    background:rgba(255,211,227,.055);
    box-shadow:
      0 0 0 1px rgba(255,211,227,.04),
      0 0 26px rgba(255,172,202,.18),
      inset 0 1px 0 rgba(255,255,255,.06);
  }

  /* base list is a near-invisible ghost; the lens reveals it bright + magnified */
  .list.ghost{ opacity:.07; z-index:1; }
  .list.magnified{
    position:absolute; top:0; left:0;
    opacity:1;
    will-change:transform,left,top;
  }
  .list.magnified .row.selected{ animation:sel 3.6s var(--ease) infinite; }
  @keyframes sel{
    0%,100%{ box-shadow:0 0 0 1px rgba(255,211,227,.04),0 0 22px rgba(255,172,202,.16),inset 0 1px 0 rgba(255,255,255,.06); }
    50%    { box-shadow:0 0 0 1px rgba(255,211,227,.06),0 0 38px rgba(255,172,202,.34),inset 0 1px 0 rgba(255,255,255,.09); }
  }

  /* ---------- the glass lens ---------- */
  .lens{
    position:absolute; top:0; left:0;
    width:300px; height:300px;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    will-change:left,top;
    z-index:3;
  }
  .clip{ position:absolute; inset:0; border-radius:50%; overflow:hidden; }
  .refract{
    position:absolute; inset:0; border-radius:50%;
    -webkit-backdrop-filter:brightness(1.05) saturate(1.12);
    backdrop-filter:url(#lensFilter) brightness(1.05) saturate(1.12);
  }

  /* glass body: spherical shading + thickness */
  .body{
    position:absolute; inset:0; border-radius:50%;
    background:
      radial-gradient(118% 118% at 33% 25%, rgba(255,255,255,.12), rgba(255,255,255,.015) 44%, transparent 62%),
      radial-gradient(130% 130% at 70% 84%, rgba(255,211,227,.05), transparent 55%);
    box-shadow:
      inset 0 0 26px rgba(255,255,255,.07),
      inset 0 1px 1px rgba(255,255,255,.24),
      0 30px 70px rgba(0,0,0,.6),
      0 8px 22px rgba(0,0,0,.5);
  }

  /* Frankly prism chromatic fringe at the very edge */
  .fringe{
    position:absolute; inset:-1px; border-radius:50%;
    background:var(--prism-conic);
    -webkit-mask:radial-gradient(closest-side, transparent 89%, #000 95%, transparent 100%);
    mask:radial-gradient(closest-side, transparent 89%, #000 95%, transparent 100%);
    mix-blend-mode:screen; opacity:.55; filter:blur(.6px);
  }

  /* the bright caustic rim */
  .rim{
    position:absolute; inset:0; border-radius:50%;
    background:
      radial-gradient(closest-side, transparent 92.5%, rgba(255,255,255,.82) 96%, rgba(255,255,255,.14) 99%, transparent 100%),
      radial-gradient(closest-side, transparent 81%, rgba(255,255,255,.16) 90%, transparent 93%);
    mix-blend-mode:screen;
  }
  .rim::after{
    content:""; position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 200deg at 50% 50%,
      transparent 0deg, rgba(255,255,255,.9) 22deg, transparent 60deg,
      transparent 300deg, rgba(255,255,255,.45) 330deg, transparent 360deg);
    -webkit-mask:radial-gradient(closest-side, transparent 92%, #000 95%, transparent 100%);
    mask:radial-gradient(closest-side, transparent 92%, #000 95%, transparent 100%);
    mix-blend-mode:screen; opacity:.8;
  }

  /* ---------- chrome ---------- */
  .backlink{
    position:fixed; top:20px; left:20px; z-index:9;
    display:inline-flex; align-items:center; gap:7px;
    padding:8px 15px; border-radius:var(--r-pill);
    font-family:var(--sans); font-size:13px; font-weight:500; letter-spacing:.01em;
    color:rgba(255,255,255,.72); text-decoration:none;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.10);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    transition:color var(--dur-hover) var(--ease), background var(--dur-hover) var(--ease), border-color var(--dur-hover) var(--ease);
  }
  .backlink:hover{ color:#fff; background:rgba(255,211,227,.09); border-color:rgba(255,211,227,.28); }

  .caption{
    position:fixed; bottom:26px; left:0; right:0; z-index:9;
    text-align:center; font-family:var(--sans);
  }
  .caption .t{ font-size:13px; font-weight:600; letter-spacing:.02em; color:rgba(255,255,255,.68); }
  .caption .s{ display:block; margin-top:4px; font-size:11px; letter-spacing:.06em; color:rgba(255,255,255,.30); }
</style>
<style>
@font-face{font-family:"Almarena Neue Display";font-weight:600 700;font-display:swap;src:url("/effekt-lab/fonts/AlmarenaNeue-Ds-SemiBold.woff2") format("woff2")}
@font-face{font-family:"Switzer";font-weight:400;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Regular.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:500;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Medium.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:600;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Semibold.otf") format("opentype")}
</style>
</head>
<body class="fl">

  <a class="backlink" href="../../index.html">← Effekt-lab</a>

  <div class="field" id="field">
    <div class="list ghost" id="ghost">
      <div class="heading">Design</div>

      <div class="row">
        <span class="chev">›</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Elementer
      </div>

      <div class="row selected" id="selrow">
        <span class="chev">›</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Ikoner
      </div>

      <div class="row">
        <span class="chev">›</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Shader
      </div>
    </div>

    <div class="lens" id="lens">
      <div class="clip">
        <!-- magnified list copy is injected here by JS -->
        <div class="refract"></div>
      </div>
      <div class="body"></div>
      <div class="fringe"></div>
      <div class="rim"></div>
    </div>
  </div>

  <div class="vignette"></div>

  <div class="caption">
    <span class="t">Mappe-linse</span>
    <span class="s">efter Framer Folders</span>
  </div>

  <!-- SVG refraction filter; displacement map generated in JS -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="lensFilter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feImage id="lensMap" result="map" preserveAspectRatio="none"/>
      <feDisplacementMap in="SourceGraphic" in2="map" scale="138"
        xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feGaussianBlur in="disp" stdDeviation="0.35"/>
    </filter>
  </svg>

<script>
  const LENS = 300;          // lens diameter (matches .lens size)
  const MAG  = 1.32;         // magnification inside the lens

  /* ---- build the spherical displacement map (flat centre, hard push at rim) ---- */
  function buildLensMap(size){
    const cv = document.createElement('canvas');
    cv.width = cv.height = size;
    const ctx = cv.getContext('2d');
    const img = ctx.createImageData(size, size);
    const R = size/2;
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const dx=(x-R)/R, dy=(y-R)/R;
        const r=Math.hypot(dx,dy);
        let nx=0, ny=0;
        if(r<1){
          const strength=Math.pow(r,2.6);
          const inv = r>0.0001 ? 1/r : 0;
          nx = dx*inv*strength;
          ny = dy*inv*strength;
        }
        const i=(y*size+x)*4;
        img.data[i]   = Math.max(0,Math.min(255,128+nx*127));
        img.data[i+1] = Math.max(0,Math.min(255,128+ny*127));
        img.data[i+2] = 128;
        img.data[i+3] = 255;
      }
    }
    ctx.putImageData(img,0,0);
    return cv.toDataURL();
  }
  const mapEl = document.getElementById('lensMap');
  mapEl.setAttribute('href', buildLensMap(LENS));
  mapEl.setAttribute('x',0); mapEl.setAttribute('y',0);
  mapEl.setAttribute('width',LENS); mapEl.setAttribute('height',LENS);

  /* ---- clone the list as the bright magnified copy that sits behind the refract ---- */
  const field  = document.getElementById('field');
  const ghost  = document.getElementById('ghost');
  const lens   = document.getElementById('lens');
  const clip   = lens.querySelector('.clip');
  const refract= lens.querySelector('.refract');

  const copy = ghost.cloneNode(true);
  copy.id = '';
  copy.classList.remove('ghost');
  copy.classList.add('magnified');
  clip.insertBefore(copy, refract);   // behind the refract layer

  /* ---- geometry ---- */
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  let cx=160, baseY=150, amp=52;

  function measure(){
    cx = ghost.offsetWidth/2;
    const sel = document.getElementById('selrow');
    baseY = sel.offsetTop + sel.offsetHeight/2;   // Ikoner centre (list is at 0,0 of field)
    const rows = ghost.querySelectorAll('.row');
    const first = rows[0], last = rows[rows.length-1];
    const firstY = first.offsetTop + first.offsetHeight/2;
    const lastY  = last.offsetTop  + last.offsetHeight/2;
    amp = Math.max(28, (lastY - firstY)/2);       // drift from top row to bottom row
  }

  function place(cy){
    lens.style.left = cx + 'px';
    lens.style.top  = cy + 'px';
    // align copy to the ghost, then magnify around the point under the lens
    copy.style.left = (LENS/2 - cx) + 'px';
    copy.style.top  = (LENS/2 - cy) + 'px';
    copy.style.transformOrigin = cx + 'px ' + cy + 'px';
    copy.style.transform = 'scale(' + MAG + ')';
  }

  let t=0;
  function loop(){
    t += 0.016;
    const cy = baseY + Math.sin(t*0.62) * amp;
    place(cy);
    requestAnimationFrame(loop);
  }

  function start(){
    measure();
    if(reduce){ place(baseY); }        // hold static over the selected row
    else { requestAnimationFrame(loop); }
  }

  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(start);
  } else { start(); }
  addEventListener('resize', measure);
</script>
</body>
</html>
