<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kinetiske felter — Frankly Effekt-lab</title>
<link rel="stylesheet" href="../assets/frankly-brand.css">
<style>
  html,body{height:100%;margin:0}
  .fl{
    min-height:100%;
    background:
      radial-gradient(120% 90% at 50% 12%, var(--blush) 0%, var(--limestone) 46%, var(--limestone-soft) 100%);
    overflow:hidden;
  }

  /* ---- stage ---------------------------------------------------- */
  .stage{
    position:fixed; inset:0;
    display:grid; place-items:center;
  }
  .scene{
    position:relative;
    width:min(78vmin,640px);
    height:min(78vmin,640px);
    transform-style:preserve-3d;
  }

  /* ---- shared tile / sphere base -------------------------------- */
  .tile,.sphere{
    position:absolute;
    left:50%; top:50%;
    will-change:transform,border-radius,filter;
    transform:translate(-50%,-50%);
  }

  .tile{
    border-radius:26% 26% 26% 26% / 30% 30% 30% 30%;
    box-shadow:
      0 2px 6px rgba(45,0,17,.08),
      0 26px 56px rgba(45,0,17,.16);
    overflow:hidden;
    isolation:isolate;
  }
  /* subtle top sheen so tiles read as physical panels */
  .tile::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(160deg,rgba(255,255,255,.34),rgba(255,255,255,0) 42%);
    mix-blend-mode:screen; pointer-events:none;
  }

  /* ---- individual tiles ----------------------------------------- */
  .t1{ width:210px; height:250px;
    background:linear-gradient(150deg,var(--bordeaux),var(--bordeaux-2) 55%,#8A1F4A);
    animation:t1 11s var(--ease-out) infinite; z-index:5; }
  .t2{ width:180px; height:214px;
    background:linear-gradient(200deg,var(--calm-pink),var(--calm-deep) 60%,#FF6FA5);
    animation:t2 11s var(--ease-out) infinite; z-index:6; }
  .t3{ width:196px; height:236px;
    background:linear-gradient(180deg,var(--blush),var(--calm-pink) 48%,var(--calm-deep));
    animation:t3 11s var(--ease-out) infinite; z-index:4; }
  .t4{ width:150px; height:150px;
    background:var(--prism);
    animation:t4 11s var(--ease-out) infinite; z-index:7; }
  .t5{ width:160px; height:196px;
    background:linear-gradient(160deg,var(--paper),var(--pink-stone) 70%,var(--calm-pink));
    box-shadow:0 2px 6px rgba(45,0,17,.06),0 22px 46px rgba(45,0,17,.12);
    animation:t5 11s var(--ease-out) infinite; z-index:3; }

  /* ---- spheres: real dimensional shading ------------------------ */
  .sphere{ border-radius:50%; }
  .sphere::before{ /* contact / drop shadow */
    content:""; position:absolute;
    left:50%; bottom:-16%;
    width:82%; height:26%;
    transform:translateX(-50%);
    background:radial-gradient(50% 50% at 50% 50%,rgba(45,0,17,.30),rgba(45,0,17,0) 72%);
    filter:blur(4px); z-index:-1;
  }
  .s1{ width:130px; height:130px;
    background:
      radial-gradient(34% 30% at 33% 27%, rgba(255,255,255,.92), rgba(255,255,255,0) 40%),
      radial-gradient(120% 120% at 32% 26%, #FF6FA5 0%, var(--calm-deep) 30%, #8A1F4A 66%, var(--bordeaux) 100%);
    animation:s1 11s var(--ease) infinite; z-index:9; }
  .s2{ width:74px; height:74px;
    background:
      radial-gradient(36% 32% at 34% 28%, rgba(255,255,255,.95), rgba(255,255,255,0) 42%),
      radial-gradient(120% 120% at 33% 27%, var(--calm-pink) 0%, var(--calm-deep) 40%, #E0709A 100%);
    animation:s2 11s var(--ease) infinite; z-index:8; }
  .s3{ width:52px; height:52px;
    background:
      radial-gradient(38% 34% at 34% 28%, rgba(255,255,255,.96), rgba(255,255,255,0) 44%),
      radial-gradient(120% 120% at 33% 27%, #7A1B42 0%, var(--bordeaux-2) 45%, var(--bordeaux) 100%);
    animation:s3 11s var(--ease) infinite; z-index:10; }
  .s4{ width:30px; height:30px;
    background:
      radial-gradient(40% 36% at 34% 28%, rgba(255,255,255,.98), rgba(255,255,255,0) 46%),
      radial-gradient(120% 120% at 33% 27%, var(--calm-deep) 0%, #E0709A 60%, #8A1F4A 100%);
    animation:s4 11s var(--ease) infinite; z-index:9; }

  /* ============ choreography (0% === 100% for seamless loop) ===== */
  /* tiles glide, overlap, stack, breathe their radius, drift back   */
  @keyframes t1{
    0%   {transform:translate(-50%,-50%) translate(-96px,-40px) rotate(-5deg) scale(1);   border-radius:26%/30%}
    25%  {transform:translate(-50%,-50%) translate(-30px,-64px) rotate(2deg)  scale(1.06);border-radius:42% 30% 38% 30%/34% 44% 30% 40%}
    50%  {transform:translate(-50%,-50%) translate(48px,-8px)   rotate(6deg)  scale(.96); border-radius:30%/34%}
    75%  {transform:translate(-50%,-50%) translate(-10px,52px)  rotate(-3deg) scale(1.02);border-radius:38% 40% 30% 42%/40% 30% 44% 30%}
    100% {transform:translate(-50%,-50%) translate(-96px,-40px) rotate(-5deg) scale(1);   border-radius:26%/30%}
  }
  @keyframes t2{
    0%   {transform:translate(-50%,-50%) translate(70px,-72px)  rotate(6deg)  scale(1);   border-radius:30%/34%}
    25%  {transform:translate(-50%,-50%) translate(6px,-18px)   rotate(-2deg) scale(1.05);border-radius:44% 30% 40% 30%/30% 42% 30% 46%}
    50%  {transform:translate(-50%,-50%) translate(-72px,44px)  rotate(-7deg) scale(.94); border-radius:28%/32%}
    75%  {transform:translate(-50%,-50%) translate(22px,80px)   rotate(3deg)  scale(1.01);border-radius:36% 44% 30% 40%/44% 30% 40% 32%}
    100% {transform:translate(-50%,-50%) translate(70px,-72px)  rotate(6deg)  scale(1);   border-radius:30%/34%}
  }
  @keyframes t3{
    0%   {transform:translate(-50%,-50%) translate(104px,40px)  rotate(-4deg) scale(1);   border-radius:32%/34%}
    25%  {transform:translate(-50%,-50%) translate(58px,96px)   rotate(4deg)  scale(.95); border-radius:40% 30% 46% 30%/30% 44% 30% 40%}
    50%  {transform:translate(-50%,-50%) translate(-40px,66px)  rotate(8deg)  scale(1.05);border-radius:30%/36%}
    75%  {transform:translate(-50%,-50%) translate(72px,-6px)   rotate(2deg)  scale(1.0); border-radius:44% 34% 40% 30%/40% 30% 46% 30%}
    100% {transform:translate(-50%,-50%) translate(104px,40px)  rotate(-4deg) scale(1);   border-radius:32%/34%}
  }
  @keyframes t4{
    0%   {transform:translate(-50%,-50%) translate(-20px,96px)  rotate(8deg)  scale(1);   border-radius:34%/34%}
    25%  {transform:translate(-50%,-50%) translate(-84px,30px)  rotate(-4deg) scale(1.12);border-radius:50%/50%}
    50%  {transform:translate(-50%,-50%) translate(-6px,-40px)  rotate(3deg)  scale(.9);  border-radius:30%/30%}
    75%  {transform:translate(-50%,-50%) translate(64px,60px)   rotate(-6deg) scale(1.04);border-radius:46% 30% 44% 30%/30% 46% 30% 44%}
    100% {transform:translate(-50%,-50%) translate(-20px,96px)  rotate(8deg)  scale(1);   border-radius:34%/34%}
  }
  @keyframes t5{
    0%   {transform:translate(-50%,-50%) translate(-108px,70px) rotate(4deg)  scale(1);   border-radius:34%/36%}
    25%  {transform:translate(-50%,-50%) translate(-48px,10px)  rotate(-3deg) scale(1.06);border-radius:44% 30% 40% 34%/30% 44% 34% 40%}
    50%  {transform:translate(-50%,-50%) translate(40px,-40px)  rotate(5deg)  scale(.95); border-radius:30%/34%}
    75%  {transform:translate(-50%,-50%) translate(-64px,-58px) rotate(-2deg) scale(1.02);border-radius:40% 44% 30% 42%/42% 30% 44% 30%}
    100% {transform:translate(-50%,-50%) translate(-108px,70px) rotate(4deg)  scale(1);   border-radius:34%/36%}
  }

  /* spheres orbit and drift with gentle depth (scale = nearness) */
  @keyframes s1{
    0%   {transform:translate(-50%,-50%) translate(-150px,120px) scale(1)}
    25%  {transform:translate(-50%,-50%) translate(120px,150px)  scale(1.18)}
    50%  {transform:translate(-50%,-50%) translate(176px,-30px)  scale(.86)}
    75%  {transform:translate(-50%,-50%) translate(-40px,-146px) scale(1.05)}
    100% {transform:translate(-50%,-50%) translate(-150px,120px) scale(1)}
  }
  @keyframes s2{
    0%   {transform:translate(-50%,-50%) translate(168px,-118px) scale(1)}
    25%  {transform:translate(-50%,-50%) translate(60px,168px)   scale(.8)}
    50%  {transform:translate(-50%,-50%) translate(-190px,64px)  scale(1.24)}
    75%  {transform:translate(-50%,-50%) translate(-96px,-150px) scale(.94)}
    100% {transform:translate(-50%,-50%) translate(168px,-118px) scale(1)}
  }
  @keyframes s3{
    0%   {transform:translate(-50%,-50%) translate(-176px,-96px) scale(1)}
    25%  {transform:translate(-50%,-50%) translate(150px,-140px) scale(1.2)}
    50%  {transform:translate(-50%,-50%) translate(196px,110px)  scale(.82)}
    75%  {transform:translate(-50%,-50%) translate(10px,178px)   scale(1.08)}
    100% {transform:translate(-50%,-50%) translate(-176px,-96px) scale(1)}
  }
  @keyframes s4{
    0%   {transform:translate(-50%,-50%) translate(210px,40px)   scale(1)}
    25%  {transform:translate(-50%,-50%) translate(120px,-170px) scale(.9)}
    50%  {transform:translate(-50%,-50%) translate(-200px,-120px)scale(1.3)}
    75%  {transform:translate(-50%,-50%) translate(-150px,150px) scale(1)}
    100% {transform:translate(-50%,-50%) translate(210px,40px)   scale(1)}
  }

  /* ---- back-link pill ------------------------------------------- */
  .back{
    position:fixed; top:20px; left:20px; z-index:50;
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 15px 9px 12px;
    font-family:var(--sans); font-size:13px; font-weight:500;
    color:var(--bordeaux); text-decoration:none;
    background:rgba(255,255,255,.72);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    border:1px solid var(--line-dark);
    border-radius:var(--r-pill);
    box-shadow:var(--shadow-card);
    transition:transform var(--dur-hover) var(--ease-out), background var(--dur-hover) var(--ease-out);
  }
  .back:hover{ transform:translateX(-2px); background:rgba(255,255,255,.9); }

  /* ---- caption -------------------------------------------------- */
  .caption{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    z-index:50; text-align:center; pointer-events:none;
  }
  .caption .title{
    font-family:var(--display); font-weight:600; font-size:15px;
    letter-spacing:-.01em; color:var(--bordeaux);
  }
  .caption .sub{
    display:block; margin-top:3px;
    font-family:var(--sans); font-size:11px; letter-spacing:.06em;
    color:var(--grey-2);
  }

  @media (prefers-reduced-motion:reduce){
    .tile,.sphere{animation:none!important}
    /* tasteful static composition */
    .t1{transform:translate(-50%,-50%) translate(-96px,-40px) rotate(-5deg)}
    .t2{transform:translate(-50%,-50%) translate(70px,-72px)  rotate(6deg)}
    .t3{transform:translate(-50%,-50%) translate(104px,40px)  rotate(-4deg)}
    .t4{transform:translate(-50%,-50%) translate(-20px,96px)  rotate(8deg)}
    .t5{transform:translate(-50%,-50%) translate(-108px,70px) rotate(4deg)}
    .s1{transform:translate(-50%,-50%) translate(-150px,120px)}
    .s2{transform:translate(-50%,-50%) translate(168px,-118px)}
    .s3{transform:translate(-50%,-50%) translate(-176px,-96px)}
    .s4{transform:translate(-50%,-50%) translate(210px,40px)}
  }
</style>
<style>
@font-face{font-family:"Almarena Neue Display";font-weight:600 700;font-display:swap;src:url("/effekt-lab/fonts/AlmarenaNeue-Ds-SemiBold.woff2") format("woff2")}
@font-face{font-family:"Switzer";font-weight:400;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Regular.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:500;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Medium.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:600;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Semibold.otf") format("opentype")}
</style>
</head>
<body class="fl">

  <a class="back" href="../../index.html">← Effekt-lab</a>

  <div class="stage">
    <div class="scene">
      <div class="tile t5"></div>
      <div class="tile t3"></div>
      <div class="tile t1"></div>
      <div class="tile t2"></div>
      <div class="tile t4"></div>

      <div class="sphere s2"></div>
      <div class="sphere s4"></div>
      <div class="sphere s1"></div>
      <div class="sphere s3"></div>
    </div>
  </div>

  <div class="caption">
    <span class="title">Kinetiske felter</span>
    <span class="sub">efter Kinetic Tile Study</span>
  </div>

</body>
</html>
