<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tænke-tilstande — Frankly Effekt-lab</title>
<link rel="stylesheet" href="../assets/frankly-brand.css">
<style>
  html,body{margin:0;height:100%}
  body.fl{
    min-height:100vh;
    background:
      radial-gradient(120% 90% at 50% 8%, #3A0518 0%, #2D0011 42%, #1B0009 100%);
    color:#FFF6FA;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  /* fine grain / vignette to keep the dark stage rich, not flat */
  body.fl::after{
    content:""; position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(130% 100% at 50% 50%, transparent 55%, rgba(0,0,0,.45) 100%);
  }

  /* ---- back-link pill ---- */
  .back{
    position:fixed; top:22px; left:22px; z-index:10;
    display:inline-flex; align-items:center; gap:8px;
    padding:9px 15px 9px 13px;
    font-family:var(--sans); font-size:13px; font-weight:500; letter-spacing:.01em;
    color:rgba(255,246,250,.72); text-decoration:none;
    background:rgba(255,246,250,.05);
    border:1px solid rgba(255,246,250,.10);
    border-radius:var(--r-pill);
    backdrop-filter:blur(8px);
    transition:color var(--dur-hover) var(--ease), background var(--dur-hover) var(--ease), border-color var(--dur-hover) var(--ease);
  }
  .back:hover{ color:#FFF6FA; background:rgba(255,246,250,.09); border-color:rgba(255,246,250,.20); }
  .back .arw{ font-size:15px; line-height:1; transition:transform var(--dur-hover) var(--ease); }
  .back:hover .arw{ transform:translateX(-3px); }

  /* ---- grid ---- */
  .grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 360px));
    grid-template-rows:repeat(2, auto);
    gap:76px 100px;
    padding:32px;
  }

  .cell{
    display:flex; align-items:center; gap:22px;
  }

  .icon{
    flex:0 0 auto;
    width:72px; height:72px;
    display:flex; align-items:center; justify-content:center;
  }

  .label{ display:flex; flex-direction:column; gap:3px; }
  .label .ttl{
    font-family:var(--display); font-weight:600;
    font-size:26px; letter-spacing:-.015em; line-height:1.05;
    color:#FFF6FA;
  }
  .label .sub{
    font-family:var(--sans); font-weight:400;
    font-size:15px; letter-spacing:.005em;
    color:rgba(255,246,250,.42);
  }
  /* animated ellipsis on the title */
  .dots::after{
    content:"…";
    display:inline-block; width:1.1ch; text-align:left;
    animation:dots 1.6s steps(4,end) infinite;
  }
  @keyframes dots{
    0%{clip-path:inset(0 100% 0 0)}
    30%{clip-path:inset(0 66% 0 0)}
    60%{clip-path:inset(0 33% 0 0)}
    90%,100%{clip-path:inset(0 0 0 0)}
  }

  svg{ display:block; overflow:visible; }

  /* ============ VARIANT 1 — Frankly leaf, breathing + orbit dot ============ */
  .v1-leaf{
    transform-box:fill-box; transform-origin:center;
    animation:leafBreathe 3.6s var(--ease) infinite;
  }
  @keyframes leafBreathe{
    0%,100%{ transform:scale(.9); opacity:.7; }
    50%{ transform:scale(1.04); opacity:1; }
  }
  .v1-orbit{
    transform-box:fill-box; transform-origin:36px 36px;
    animation:orbit 4.2s linear infinite;
  }
  @keyframes orbit{ to{ transform:rotate(360deg); } }
  .v1-ring{
    fill:none; stroke:rgba(255,246,250,.14); stroke-width:1.4;
    stroke-dasharray:2 7; stroke-linecap:round;
    animation:ringSpin 9s linear infinite reverse;
    transform-box:fill-box; transform-origin:center;
  }
  @keyframes ringSpin{ to{ transform:rotate(360deg); } }

  /* ============ VARIANT 2 — equalizer bars, shimmer ============ */
  .v2-bar{
    fill:var(--calm-pink);
    transform-box:fill-box; transform-origin:center bottom;
    animation:eq 1.15s var(--ease-out) infinite;
  }
  @keyframes eq{
    0%,100%{ transform:scaleY(.28); opacity:.55; }
    50%{ transform:scaleY(1); opacity:1; }
  }

  /* ============ VARIANT 3 — horizontal lines sweeping ============ */
  .v3-line{
    stroke:#FFF6FA; stroke-width:2.4; stroke-linecap:round;
    animation:sweep 2.4s var(--ease) infinite;
    transform-box:fill-box; transform-origin:center;
  }
  @keyframes sweep{
    0%,100%{ opacity:.16; transform:scaleX(.55); }
    50%{ opacity:.95; transform:scaleX(1); }
  }

  /* ============ VARIANT 4 — waveform pulse ============ */
  .v4-bar{
    fill:var(--calm-deep);
    transform-box:fill-box; transform-origin:center;
    animation:wave 1.3s var(--ease-out) infinite;
  }
  @keyframes wave{
    0%,100%{ transform:scaleY(.22); }
    50%{ transform:scaleY(1); }
  }

  /* ---- caption ---- */
  .caption{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    text-align:center; z-index:10;
  }
  .caption .c1{
    font-family:var(--display); font-weight:600;
    font-size:14px; letter-spacing:.02em; color:rgba(255,246,250,.62);
  }
  .caption .c2{
    font-family:var(--sans); font-weight:400;
    font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:rgba(255,246,250,.28); margin-top:3px;
  }

  @media (max-width:820px){
    .grid{ grid-template-columns:minmax(0,360px); gap:44px; }
  }

  @media (prefers-reduced-motion:reduce){
    .v1-leaf,.v1-orbit,.v1-ring,.v2-bar,.v3-line,.v4-bar,.dots::after{ animation:none; }
    .v1-leaf{ transform:scale(1); opacity:1; }
    .v2-bar{ transform:scaleY(.7); opacity:.9; }
    .v3-line{ transform:scaleX(.9); opacity:.7; }
    .v4-bar{ transform:scaleY(.7); }
    .dots::after{ clip-path:none; }
  }
</style>
