<html lang="da">
<head>
<meta charset="utf-8">

<title>Stemme-indstillinger · frankly</title>
<link rel="stylesheet" href="../assets/frankly-brand.css">
<style>
  :root{
    /* dark-sheet palette derived from the Frankly tokens */
    --sheet-0:#1B0009;        /* phone bezel / deepest */
    --sheet-1:#2D0011;        /* bordeaux surface */
    --sheet-2:#3A0A1F;        /* raised card */
    --sheet-3:#48132B;        /* hover / thumb track fill */
    --hairline:rgba(255,211,227,.10);
    --hairline-2:rgba(255,211,227,.16);
    --txt:#FCEAF1;            /* near-white pink */
    --txt-dim:rgba(255,235,243,.62);
    --txt-mute:rgba(255,235,243,.40);
    --accent:var(--calm-deep);
    --sel-grad:linear-gradient(135deg,#2D0011 0%,#7A1740 46%,#C24A78 100%);
    --gloss:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,0) 42%);
  }

  html,body{height:100%}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1100px 720px at 50% -8%, var(--blush), rgba(255,246,250,0) 60%),
      radial-gradient(900px 640px at 84% 108%, #FBEDF2, rgba(251,237,242,0) 62%),
      var(--limestone);
    display:grid;
    place-items:center;
    overflow:hidden;
  }

  /* ---------- back-link pill ---------- */
  .back{
    position:fixed; top:20px; left:20px; z-index:20;
    display:inline-flex; align-items:center; gap:8px;
    padding:9px 15px 9px 12px;
    font:600 13px/1 var(--sans); letter-spacing:.01em;
    color:var(--bordeaux); text-decoration:none;
    background:rgba(255,255,255,.72);
    border:1px solid var(--line);
    border-radius:var(--r-pill);
    box-shadow:var(--shadow-card);
    backdrop-filter:blur(8px);
    transition:transform var(--dur-hover) var(--ease-out), background var(--dur-hover) var(--ease-out);
  }
  .back:hover{ transform:translateX(-2px); background:rgba(255,255,255,.9); }
  .back .arrow{ transition:transform var(--dur-hover) var(--ease-out); }
  .back:hover .arrow{ transform:translateX(-2px); }

  /* ---------- stage / phone ---------- */
  .stage{ display:grid; place-items:center; padding:24px; }

  .phone{
    position:relative;
    width:392px; height:812px;
    border-radius:56px;
    padding:12px;
    background:
      linear-gradient(160deg,#3a2029,#160008 60%),
      var(--sheet-0);
    box-shadow:
      0 2px 4px rgba(45,0,17,.20),
      0 40px 90px rgba(45,0,17,.34),
      0 12px 36px rgba(45,0,17,.24),
      inset 0 0 0 1.5px rgba(255,255,255,.06);
  }
  .screen{
    position:relative;
    width:100%; height:100%;
    border-radius:44px;
    overflow:hidden;
    background:
      radial-gradient(120% 80% at 50% -6%, #3a0a1f 0%, rgba(58,10,31,0) 46%),
      linear-gradient(180deg,#26000E 0%, #1B0009 100%);
    color:var(--txt);
    font-family:var(--sans);
    isolation:isolate;
  }
  /* soft top sheen */
  .screen::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:6;
    background:radial-gradient(140% 46% at 50% -14%, rgba(255,172,202,.14), rgba(255,172,202,0) 60%);
  }

  /* ---------- status bar ---------- */
  .status{
    position:relative; z-index:4;
    height:52px; padding:0 26px;
    display:flex; align-items:center; justify-content:space-between;
    font:600 15px/1 var(--sans); color:var(--txt);
    font-variant-numeric:tabular-nums;
  }
  .status .right{ display:flex; align-items:center; gap:7px; }
  .status svg{ display:block; }
  .notch{
    position:absolute; top:11px; left:50%; transform:translateX(-50%);
    width:118px; height:30px; border-radius:16px;
    background:#0b0004;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
    display:flex; align-items:center; justify-content:center; gap:52px;
  }
  .notch .cam{ width:8px; height:8px; border-radius:50%; background:#1c0910; box-shadow:inset 0 0 0 1.5px rgba(255,120,160,.35); }
  .notch .rec{ width:9px; height:9px; border-radius:50%; background:var(--calm-deep); box-shadow:0 0 8px rgba(255,172,202,.7); }

  /* ---------- scroll body ---------- */
  .body{
    position:relative; z-index:3;
    height:calc(100% - 52px);
    overflow-y:auto;
    padding:2px 20px 30px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .body::-webkit-scrollbar{ display:none; }

  .grabber{ width:36px; height:5px; border-radius:3px; background:rgba(255,235,243,.22); margin:8px auto 4px; }

  /* header */
  .head{
    display:flex; align-items:center; gap:14px;
    padding:6px 2px 18px;
  }
  .xbtn{
    width:40px; height:40px; border-radius:50%;
    display:grid; place-items:center; flex:0 0 auto;
    background:var(--sheet-2);
    border:1px solid var(--hairline);
    color:var(--txt); box-shadow:var(--gloss);
  }
  .head h1{
    flex:1; margin:0; text-align:center;
    font-family:var(--display); font-weight:600; font-size:21px;
    letter-spacing:-.01em; color:var(--txt);
  }
  .head .wm{
    flex:0 0 auto; display:flex; align-items:center; gap:6px;
    padding-right:2px; opacity:.9;
  }
  .head .wm .mark{ width:15px; height:auto; filter:brightness(0) invert(1); opacity:.92; }
  .head .wm .name{ font:600 13px/1 var(--sans); color:var(--txt); letter-spacing:-.01em; }

  /* section label */
  .label{
    font:600 13px/1 var(--sans); letter-spacing:.02em;
    color:var(--txt-mute); text-transform:none;
    margin:22px 2px 12px;
  }
  .label:first-of-type{ margin-top:6px; }

  /* ---------- voice cards ---------- */
  .voices{
    display:flex; gap:12px;
    overflow-x:auto; padding:2px 2px 6px;
    scroll-snap-type:x mandatory; scrollbar-width:none;
    margin:0 -20px; padding-left:20px; padding-right:20px;
  }
  .voices::-webkit-scrollbar{ display:none; }
  .vcard{
    position:relative; flex:0 0 208px; scroll-snap-align:start;
    height:88px; padding:16px 18px; border-radius:20px;
    background:var(--sheet-2);
    border:1px solid var(--hairline);
    box-shadow:var(--gloss);
    display:flex; flex-direction:column; justify-content:center; gap:5px;
    overflow:hidden;
  }
  .vcard .vname{ font-family:var(--display); font-weight:600; font-size:20px; color:var(--txt); letter-spacing:-.01em; }
  .vcard .vdesc{ font:500 14px/1.1 var(--sans); color:var(--txt-dim); }
  .vcard .check{
    position:absolute; top:14px; right:14px;
    width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; opacity:0; transform:scale(.6);
    transition:opacity .3s var(--ease-out), transform .3s var(--ease-spring);
  }
  /* selected */
  .vcard.sel{
    background:var(--sel-grad);
    border-color:rgba(255,172,202,.34);
    box-shadow:
      var(--gloss),
      0 10px 26px rgba(122,23,64,.4);
  }
  .vcard.sel .vdesc{ color:rgba(255,235,243,.86); }
  .vcard.sel::after{
    content:""; position:absolute; inset:-1px; border-radius:20px; pointer-events:none;
    box-shadow:0 0 0 1px rgba(255,211,227,.45), 0 0 26px 2px rgba(255,172,202,.28);
    animation:breathe 3.6s var(--ease) infinite;
  }
  .vcard.sel .check{
    opacity:1; transform:scale(1);
    background:#fff; color:#7A1740;
  }
  @keyframes breathe{
    0%,100%{ opacity:.5; }
    50%{ opacity:1; }
  }

  /* ---------- dropdown row ---------- */
  .row{
    display:flex; align-items:center;
    min-height:60px; padding:0 20px;
    border-radius:18px;
    background:var(--sheet-2);
    border:1px solid var(--hairline);
    box-shadow:var(--gloss);
    color:var(--txt);
  }
  .row + .row{ margin-top:12px; }
  .row .rlabel{ font:500 17px/1 var(--sans); color:var(--txt); flex:1; }
  .row .rval{ font:500 16px/1 var(--sans); color:var(--txt-dim); margin-right:8px; }
  .row .ricon{ color:var(--txt-dim); display:grid; place-items:center; }

  /* ---------- personality presets ---------- */
  .persona{
    display:flex; gap:16px;
    overflow-x:auto; scrollbar-width:none;
    margin:0 -20px; padding:4px 20px 8px;
  }
  .persona::-webkit-scrollbar{ display:none; }
  .pitem{ flex:0 0 auto; width:78px; display:flex; flex-direction:column; align-items:center; gap:9px; }
  .pcirc{
    position:relative; width:74px; height:74px; border-radius:50%;
    background:var(--sheet-2);
    border:1px solid var(--hairline);
    box-shadow:var(--gloss);
    display:grid; place-items:center; color:var(--txt);
  }
  .pitem.active .pcirc{
    background:linear-gradient(150deg,#3A0A1F, #5c1233);
    border-color:rgba(255,172,202,.3);
  }
  .pitem.active .pcirc::after{
    content:""; position:absolute; inset:-2px; border-radius:50%; pointer-events:none;
    box-shadow:0 0 0 1px rgba(255,211,227,.4);
    animation:idlepulse 3.2s var(--ease) infinite;
  }
  .pitem:nth-child(2) .pcirc::after,
  .pitem:nth-child(3) .pcirc::after,
  .pitem:nth-child(4) .pcirc::after{ content:""; position:absolute; inset:-2px; border-radius:50%; pointer-events:none; box-shadow:0 0 0 1px rgba(255,211,227,0); animation:idlepulse 3.2s var(--ease) infinite; }
  .pitem:nth-child(2) .pcirc::after{ animation-delay:.5s; }
  .pitem:nth-child(3) .pcirc::after{ animation-delay:1s; }
  .pitem:nth-child(4) .pcirc::after{ animation-delay:1.5s; }
  @keyframes idlepulse{
    0%,100%{ box-shadow:0 0 0 1px rgba(255,211,227,.16), 0 0 0 0 rgba(255,172,202,0); }
    50%{ box-shadow:0 0 0 1px rgba(255,211,227,.32), 0 0 14px 2px rgba(255,172,202,.16); }
  }
  .pitem.active .pcirc::after{
    animation:idlepulse-strong 3.2s var(--ease) infinite;
  }
  @keyframes idlepulse-strong{
    0%,100%{ box-shadow:0 0 0 1px rgba(255,211,227,.42), 0 0 0 0 rgba(255,172,202,0); }
    50%{ box-shadow:0 0 0 1px rgba(255,211,227,.6), 0 0 18px 3px rgba(255,172,202,.28); }
  }
  .pcbadge{
    position:absolute; top:-3px; right:-3px;
    width:22px; height:22px; border-radius:50%;
    background:#fff; color:#7A1740;
    display:grid; place-items:center;
    box-shadow:0 2px 6px rgba(45,0,17,.4);
  }
  .plabel{ font:500 13px/1.2 var(--sans); color:var(--txt-dim); text-align:center; }
  .pitem.active .plabel{ color:var(--txt); }

  /* ---------- speed slider ---------- */
  .speed{
    display:flex; align-items:center; gap:14px;
    height:64px; padding:0 12px 0 12px;
    border-radius:20px;
    background:var(--sheet-2);
    border:1px solid var(--hairline);
    box-shadow:var(--gloss);
  }
  .spval{
    flex:0 0 auto; min-width:64px; height:44px; padding:0 14px;
    border-radius:14px;
    background:rgba(255,235,243,.06);
    border:1px solid var(--hairline);
    display:grid; place-items:center;
    font:600 18px/1 var(--sans); color:var(--txt);
    font-variant-numeric:tabular-nums;
  }
  .track{
    position:relative; flex:1; height:8px; border-radius:6px;
    background:rgba(255,235,243,.14);
    margin-right:8px;
  }
  .fill{
    position:absolute; left:0; top:0; height:100%; border-radius:6px;
    background:linear-gradient(90deg,#C24A78,#FFACCA);
    width:34%;
    animation:slide 5.2s var(--ease) infinite;
  }
  .thumb{
    position:absolute; top:50%; left:34%;
    width:26px; height:26px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(120% 120% at 30% 25%,#fff,#ffe6ef 70%);
    box-shadow:0 2px 8px rgba(45,0,17,.5), inset 0 0 0 1px rgba(255,172,202,.4);
    animation:slide 5.2s var(--ease) infinite;
  }
  @keyframes slide{
    0%   { left:16%; width:16%; }
    50%  { left:74%; width:74%; }
    100% { left:16%; width:16%; }
  }
  /* .fill uses width, .thumb uses left — separate keyframes to keep them coupled */
  .fill{ animation-name:fillslide; }
  @keyframes fillslide{
    0%{ width:16%; } 50%{ width:74%; } 100%{ width:16%; }
  }
  .thumb{ animation-name:thumbslide; }
  @keyframes thumbslide{
    0%{ left:16%; } 50%{ left:74%; } 100%{ left:16%; }
  }

  /* ---------- toggle rows ---------- */
  .toggle-icn{ color:var(--txt-dim); display:grid; place-items:center; margin-left:auto; }
  .switch{
    margin-left:auto; flex:0 0 auto;
    width:52px; height:31px; border-radius:999px;
    background:rgba(255,235,243,.14);
    border:1px solid var(--hairline);
    position:relative;
    transition:background .3s var(--ease-out);
  }
  .switch .knob{
    position:absolute; top:2px; left:2px;
    width:25px; height:25px; border-radius:50%;
    background:radial-gradient(120% 120% at 30% 25%,#fff,#f6dbe5 80%);
    box-shadow:0 2px 5px rgba(45,0,17,.45);
    transition:transform .32s var(--ease-spring);
  }
  .switch.on{ background:linear-gradient(90deg,#7A1740,#C24A78); border-color:rgba(255,172,202,.4); }
  .switch.on .knob{ transform:translateX(21px); }

  .bottombar{ width:134px; height:5px; border-radius:3px; background:rgba(255,235,243,.5); margin:14px auto 4px; }

  /* ---------- caption ---------- */
  .caption{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
    z-index:20; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .caption .c1{ font:600 14px/1 var(--sans); color:var(--bordeaux); letter-spacing:-.01em; }
  .caption .c2{ font:500 11px/1 var(--sans); color:var(--grey-2); letter-spacing:.02em; }

  @media (max-height:860px){
    .phone{ transform:scale(.92); }
  }
  @media (max-height:800px){
    .phone{ transform:scale(.86); }
  }

  @media (prefers-reduced-motion:reduce){
    .vcard.sel::after,.pcirc::after,.fill,.thumb{ animation:none !important; }
  }
</style>

  <script>
    // speed value gently tracks the animated thumb (0.8× ↔ 1.6×)
    (function(){
      var el = document.getElementById('spval');
      if(!el) return;
      var reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
      if(reduce){ el.innerHTML = '1.2&times;'; return; }
      var dur = 5200, t0 = null;
      function frame(ts){
        if(t0===null) t0 = ts;
        var p = ((ts - t0) % dur) / dur;          // 0..1
        var tri = 1 - Math.abs(2*p - 1);          // 0..1..0 triangle
        var v = 0.8 + tri * 0.8;                  // 0.8 .. 1.6
        el.innerHTML = v.toFixed(1) + '&times;';
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
