<!doctype html>
<html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifikations-toasts · frankly</title>
<style>
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{background:#060308;overflow:hidden;font-family:"Switzer",system-ui,-apple-system,"Segoe UI",sans-serif;
    display:grid;place-items:center}
  .stage{position:fixed;inset:0;display:grid;place-items:center;
    background:radial-gradient(50% 40% at 50% 42%, #140811 0%, #0a0409 55%, #050207 100%)}
  .deck{position:relative;width:min(480px,90vw);height:170px}
  .toast{position:absolute;left:0;right:0;top:0;display:flex;align-items:center;gap:13px;
    padding:15px 17px;border-radius:20px;
    background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.015)),
      linear-gradient(180deg, #26121c, #180b13);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14), inset 0 0 0 1px rgba(255,255,255,.05),
      0 18px 40px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.5);
    transition:transform .62s cubic-bezier(.22,1,.28,1), opacity .55s ease, filter .55s ease;
    will-change:transform,opacity}
  .av{width:42px;height:42px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;
    color:#fff;font-weight:700;font-size:16px;position:relative;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 3px 8px rgba(0,0,0,.4)}
  .badge{position:absolute;right:-3px;bottom:-3px;width:19px;height:19px;border-radius:50%;
    display:grid;place-items:center;border:2.5px solid #1a0c13}
  .badge svg{width:10px;height:10px}
  .tx{min-width:0;flex:1}
  .tx .t{color:#fbeef3;font-size:14.5px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .t b{font-weight:700}
  .tx .s{color:#a98d9a;font-size:13px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .tm{color:#7d6672;font-size:11.5px;font-variant-numeric:tabular-nums;align-self:flex-start;margin-top:2px;flex:0 0 auto}

  .grain{position:fixed;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  .back{position:fixed;top:20px;left:20px;z-index:9;color:#f4d9e4;text-decoration:none;font-size:13px;font-weight:500;
    padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .cap{position:fixed;left:0;right:0;bottom:22px;text-align:center;color:#c9a7b6;font-size:12px}
  .cap b{color:#f0d7e2;font-weight:600}
</style><style>
@font-face{font-family:"Almarena Neue Display";font-weight:600 700;font-display:swap;src:url("/effekt-lab/fonts/AlmarenaNeue-Ds-SemiBold.woff2") format("woff2")}
@font-face{font-family:"Switzer";font-weight:400;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Regular.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:500;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Medium.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:600;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Semibold.otf") format("opentype")}
</style>
</head>
<body>
  <a class="back" href="../index.html">← Oversigt</a>
  <div class="stage"><div class="deck" id="deck"></div></div>
  <div class="grain"></div>
  <div class="cap">Notifikations-toasts · efter <b>X Toasts</b></div>

  <script>
    const heart='<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 21s-7-4.4-9.3-8.3C1 9.4 2.7 6 6 6c2 0 3.2 1.2 4 2.3C10.8 7.2 12 6 14 6c3.3 0 5 3.4 3.3 6.7C19 16.6 12 21 12 21z"/></svg>';
    const repost='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8l3-3 3 3M7 5v10a2 2 0 0 0 2 2h6M20 16l-3 3-3-3M17 19V9a2 2 0 0 0-2-2H9"/></svg>';
    const follow='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';
    const heartBg='linear-gradient(180deg,#FF6FA5,#C21E63)', repostBg='linear-gradient(180deg,#3ED07A,#1E9E52)', followBg='linear-gradient(180deg,#FFACCA,#FF6FA5)';
    const data=[
      {ini:'M',av:'linear-gradient(135deg,#8A1F4A,#FF6FA5)',b:'@mette',t:'delte dit opslag',s:'De nye toasts i Frankly er så rene',badge:repost,bg:repostBg},
      {ini:'J',av:'linear-gradient(135deg,#4A1030,#8A1F4A)',b:'@jonas',t:'kunne lide dit opslag',s:'Endelig et ordentligt notifikations-design',badge:heart,bg:heartBg},
      {ini:'F',av:'linear-gradient(135deg,#2D0011,#8A1F4A)',b:'@frankly',t:'følger dig nu',s:'I følger nu hinanden',badge:follow,bg:followBg},
      {ini:'L',av:'linear-gradient(135deg,#B03A6A,#FFACCA)',b:'@laura',t:'sendte dig en besked',s:'Kan vi bruge den her i kampagnen?',badge:heart,bg:heartBg},
      {ini:'S',av:'linear-gradient(135deg,#7A1C46,#FF6FA5)',b:'@sofie',t:'delte dit opslag',s:'Det her er ren notifikations-poesi',badge:repost,bg:repostBg},
    ];
    const deck=document.getElementById('deck');
    let seq=0, k=0;
    // depth presentation: index 0 = front
    const DEPTH=[{y:0,sc:1,op:1,bl:0},{y:26,sc:.945,op:.82,bl:.4},{y:50,sc:.9,op:.55,bl:1},{y:70,sc:.86,op:.28,bl:2}];
    let cards=[];
    function make(d){
      const el=document.createElement('div');el.className='toast';
      el.innerHTML=`<div class="av" style="background:${d.av}">${d.ini}<span class="badge" style="background:${d.bg}">${d.badge}</span></div>
        <div class="tx"><div class="t"><b>${d.b}</b> ${d.t}</div><div class="s">${d.s}</div></div><div class="tm">nu</div>`;
      return el;
    }
    function layout(){
      cards.forEach((c,i)=>{const D=DEPTH[i]||DEPTH[DEPTH.length-1];
        c.tm=c.el.querySelector('.tm');
        c.el.style.transform=`translateY(${D.y}px) scale(${D.sc})`;
        c.el.style.opacity=D.op;c.el.style.filter=`blur(${D.bl}px)`;c.el.style.zIndex=50-i;
        c.tm.textContent=i===0?'nu':i+'m';});
    }
    function push(){
      const d=data[k%data.length];k++;
      const el=make(d);
      // start above, hidden, then spring to front
      el.style.transform='translateY(-26px) scale(1.02)';el.style.opacity='0';el.style.filter='blur(0)';el.style.zIndex=60;
      deck.appendChild(el);
      cards.unshift({el});
      // remove overflow
      if(cards.length>4){const old=cards.pop();old.el.style.opacity='0';old.el.style.transform='translateY(54px) scale(.84)';setTimeout(()=>old.el.remove(),620);}
      requestAnimationFrame(()=>requestAnimationFrame(layout));
    }
    if(matchMedia('(prefers-reduced-motion:reduce)').matches){ for(let i=0;i<4;i++)push(); }
    else { push();push();push(); setInterval(push,2100); }
  </script>
</body></html>
