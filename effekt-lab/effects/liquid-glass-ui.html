<!doctype html>
<html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liquid glass UI · frankly</title>
<style>
  :root{--sans:"Switzer",system-ui,-apple-system,"Segoe UI",sans-serif}
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font-family:var(--sans);overflow:hidden;display:grid;place-items:center;
    background:radial-gradient(72% 62% at 50% 42%, #200c17 0%, #140811 55%, #08040a 100%)}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(46% 34% at 50% 20%, rgba(255,150,200,.14), transparent 72%)}

  .scene{perspective:1500px;perspective-origin:50% 45%}
  .panel{
    position:relative;width:min(720px,86vw);transform:rotateX(11deg) rotateY(-13deg) rotateZ(.6deg);
    border-radius:28px;padding:18px;
    /* crisp glossy glass frame (NOT displaced) */
    background:
      linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 18%),
      linear-gradient(158deg, #33141f 0%, #1c0d15 55%, #2a1019 100%);
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,.6),
      inset 0 0 0 1px rgba(255,255,255,.09),
      inset 0 -16px 34px rgba(0,0,0,.45),
      0 0 0 1px rgba(255,120,175,.10),
      0 70px 130px rgba(0,0,0,.72),
      0 26px 60px rgba(70,0,30,.55);
    animation:float 8s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:rotateX(11deg) rotateY(-13deg) rotateZ(.6deg)}
    50%{transform:rotateX(9.5deg) rotateY(-10deg) rotateZ(.2deg)}}
  /* prism chromatic rim */
  .panel::after{content:"";position:absolute;inset:0;border-radius:28px;pointer-events:none;padding:1.4px;
    background:linear-gradient(120deg,rgba(126,60,255,0),rgba(255,111,165,.6),rgba(120,200,255,.4),rgba(255,111,165,0));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.55}

  /* interior shimmers like liquid — SUBTLE displacement, frame stays crisp */
  .content{filter:url(#liquid)}

  .row{display:flex;align-items:center;gap:10px}
  .chip{display:flex;align-items:center;gap:9px;border-radius:15px;padding:12px 15px;
    background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.34),inset 0 0 0 1px rgba(255,255,255,.07),0 7px 18px rgba(0,0,0,.5);
    color:#fbeef3;font-weight:600;font-size:16px}
  .chip svg{width:16px;height:auto;display:block}
  .chip .car{opacity:.55;font-size:12px}
  .tools{margin-left:auto;display:flex;gap:18px;color:#e6d3db;align-items:center}
  .tools svg{width:20px;height:20px;display:block}

  .seg{margin-top:15px;display:flex;gap:4px;padding:5px;border-radius:16px;width:max-content;
    background:rgba(255,255,255,.05);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
  .seg span{padding:8px 17px;border-radius:12px;font-size:15px;font-weight:600;color:#c0a7b3}
  .seg .on{color:#fff;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.05));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 5px 12px rgba(0,0,0,.4)}

  .search{margin-top:15px;display:flex;align-items:center;gap:11px;border-radius:17px;padding:16px 18px;
    background:linear-gradient(180deg,rgba(0,0,0,.32),rgba(0,0,0,.12));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.12),inset 0 0 0 1px rgba(255,255,255,.06);color:#ad97a3;font-size:16px}
  .search svg{width:17px;height:17px;opacity:.7}

  .grain{position:fixed;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  .back{position:fixed;top:18px;left:18px;z-index:9;color:#f4d9e4;text-decoration:none;font-size:13px;font-weight:500;
    padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .cap{position:fixed;left:0;right:0;bottom:20px;text-align:center;color:#c9a7b6;font-size:12px}
  .cap b{color:#f0d7e2;font-weight:600}
</style><style>
@font-face{font-family:"Almarena Neue Display";font-weight:600 700;font-display:swap;src:url("/effekt-lab/fonts/AlmarenaNeue-Ds-SemiBold.woff2") format("woff2")}
@font-face{font-family:"Switzer";font-weight:400;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Regular.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:500;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Medium.otf") format("opentype")}
@font-face{font-family:"Switzer";font-weight:600;font-display:swap;src:url("/effekt-lab/fonts/Switzer-Semibold.otf") format("opentype")}
</style>
</head>
