<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Frankly — Do you know Frankly?</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="frankly-lab-brand.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:'Switzer',-apple-system,'Segoe UI',sans-serif;color:#111111;
    background:radial-gradient(1200px 600px at 75% -10%,#FFE4EF,#F5F4F1 45%)}
  .wrap{max-width:680px;margin:0 auto;padding:40px 24px 80px}
  .back{display:inline-block;color:#7a5563;text-decoration:none;font-size:14px;margin-bottom:22px}
  .back:hover{color:#2D0011}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#b06;font-weight:600}
  h1{font-size:34px;margin:6px 0 0;letter-spacing:-.6px}
  .lede{color:#7a5563;font-size:16px;margin:8px 0 26px}
  .card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(45,0,17,.07)}
  .bar{height:6px;background:#F3DEE4;border-radius:999px;overflow:hidden;margin-bottom:20px}
  .bar i{display:block;height:100%;background:#FFACCA;width:0;transition:width .3s ease}
  .qmeta{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#b3a7ac;margin-bottom:8px}
  .q{font-size:21px;font-weight:700;line-height:1.3;margin:0 0 18px;letter-spacing:-.3px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{text-align:left;background:#fff;border:1.5px solid #f0d6e0;border-radius:13px;padding:14px 16px;
    font-size:15px;font-family:inherit;color:#111;cursor:pointer;transition:border-color .12s,background .12s}
  .opt:hover{border-color:#FFACCA;background:#fff6fa}
  .opt:disabled{cursor:default}
  .opt.correct{border-color:#3Fa86b;background:#effaf2}
  .opt.wrong{border-color:#d8607a;background:#fdeef2}
  .opt .mark{float:right;font-weight:800}
  .next{margin-top:18px;width:100%;background:#2D0011;color:#fff;border:0;border-radius:13px;
    padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:none}
  .result{text-align:center}
  .score{font-size:64px;font-weight:800;color:#2D0011;letter-spacing:-2px;line-height:1}
  .tier{font-size:24px;font-weight:800;margin:6px 0 4px}
  .tdesc{color:#7a5563;margin:0 0 22px}
  .again{background:#2D0011;color:#fff;border:0;border-radius:13px;padding:13px 24px;font-size:15px;
    font-weight:700;font-family:inherit;cursor:pointer}
  .foot{margin-top:22px;font-size:12px;color:#b3a7ac;text-align:center}
</style>
</head>
<body class="fl-head">
<div class="wrap">
  <a class="back" href="index.html">← Frankly Lab</a>
  <div class="eyebrow">Internal · For everyone at Frankly</div>
  <h1>Do you know Frankly?</h1>
  <p class="lede">15 questions on our brand, voice and the words we use. No pressure — you're covered.</p>
  <div class="card" id="card"></div>
  <div class="foot">Answers come straight from our Brand Reference and Dictionary.</div>
</div>
<script>
const QUESTIONS=[
 {q:"What colour is the Frankly wordmark?",o:["Grounded Bordeaux #2D0011","Off Black #111111","Pale Calm #FFD3E3","Pure black #000000"],c:1},
 {q:"Which typeface is used for headlines and hero copy?",o:["Switzer Variable","Inter","Almarena Neue Display","Spartan"],c:2},
 {q:"Which typeface carries body copy and UI?",o:["Almarena Neue Display","Switzer Variable","Arial","Helvetica"],c:1},
 {q:"What is the hex code for the primary pink, “Pale Calm”?",o:["#FFACCA","#F3DEE4","#FFD3E3","#F5F4F1"],c:2},
 {q:"In the brand, what role does pink play?",o:["A warning / alert colour","A de-escalation colour signalling care, calm and reassurance","A purely decorative accent","The primary background for all pages"],c:1},
 {q:"Which language are Frankly's LinkedIn posts and pitch decks always written in?",o:["Danish","The partner's local language","English","Whichever the market prefers"],c:2},
 {q:"Why must the ribbon never form a figure-eight / infinity shape?",o:["It's too hard to render","It reads as the breast-cancer awareness symbol","It looks like a competitor's logo","It breaks the six-block prompt structure"],c:1},
 {q:"Where may the ribbon appear?",o:["In real-life lifestyle photos","Only in the 3D / sculptural visual route","Inside the logo","As a small repeating prop in scenes"],c:1},
 {q:"Which phrase should you avoid in AI image prompts because it creates a fake orange glow?",o:["“structured cumulus”","“Kodak Portra 400”","“golden hour”","“pink-peach lower edges”"],c:2},
 {q:"What is Frankly's operating model?",o:["A licensed carrier that underwrites its own risk","An MGA that builds and runs the product while a carrier underwrites it","A reinsurer","A price-comparison broker"],c:1},
 {q:"Which carrier underwrites Frankly's products?",o:["Finanstilsynet","ACPR","Wakam","Tryg"],c:2},
 {q:"What does “loss ratio” mean?",o:["Customers lost over a period","Claims paid divided by premiums earned","Acquisition cost divided by lifetime value","Premium left after carrier fees"],c:1},
 {q:"“Selvrisiko” in Danish refers to which insurance term?",o:["Premium","Policy wording","Excess / deductible","Reinsurance"],c:2},
 {q:"What is “embedded insurance”?",o:["Insurance bundled into a bank account","Insurance sold inside another purchase at the moment it's relevant (e.g. at checkout)","Insurance for insurers","A government-mandated cover"],c:1},
 {q:"In the LTV:CAC ratio, what level is generally considered healthy?",o:["Above 1:1","Above 3:1","Exactly 1:1","Below 1:1"],c:1}
];
const LETTERS=["A","B","C","D"];
let i=0,score=0,answered=false;
const card=document.getElementById('card');

function render(){
  answered=false;
  const q=QUESTIONS[i];
  const pct=Math.round((i/QUESTIONS.length)*100);
  let h='<div class="bar"><i style="width:'+pct+'%"></i></div>';
  h+='<div class="qmeta">Question '+(i+1)+' of '+QUESTIONS.length+'</div>';
  h+='<div class="q">'+esc(q.q)+'</div><div class="opts">';
  q.o.forEach((opt,idx)=>{ h+='<button class="opt" data-i="'+idx+'"><span class="mark"></span>'+LETTERS[idx]+'. '+esc(opt)+'</button>'; });
  h+='</div><button class="next" id="next">'+(i===QUESTIONS.length-1?'See result':'Next question')+'</button>';
  card.innerHTML=h;
  card.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',choose));
  document.getElementById('next').addEventListener('click',next);
}
function choose(e){
  if(answered)return; answered=true;
  const q=QUESTIONS[i];
  const pick=parseInt(e.currentTarget.dataset.i,10);
  const btns=card.querySelectorAll('.opt');
  btns.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.c){b.classList.add('correct');b.querySelector('.mark').textContent='✓';}
    if(idx===pick&&pick!==q.c){b.classList.add('wrong');b.querySelector('.mark').textContent='✗';}
  });
  if(pick===q.c)score++;
  document.getElementById('next').style.display='block';
}
function next(){ i++; if(i<QUESTIONS.length){render();window.scrollTo(0,0);} else result(); }
function result(){
  const n=QUESTIONS.length;
  let tier,desc;
  if(score>=13){tier="Frankly native 🐔";desc="You don't read the brand guide — you are the brand guide.";}
  else if(score>=10){tier="Brand fluent";desc="Sharp. You could brief a freelancer without blinking.";}
  else if(score>=6){tier="Getting the vibe";desc="Solid instincts — a skim of the Brand Reference and you're golden.";}
  else{tier="Fresh recruit";desc="No shame — bookmark the Dictionary and Brand Reference and run it back.";}
  card.innerHTML='<div class="result"><div class="qmeta">Your score</div>'
    +'<div class="score">'+score+'/'+n+'</div>'
    +'<div class="tier">'+tier+'</div><p class="tdesc">'+desc+'</p>'
    +'<button class="again" id="again">Try again</button></div>';
  document.getElementById('again').addEventListener('click',()=>{i=0;score=0;render();window.scrollTo(0,0);});
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
render();
</script>
</body>
</html>
