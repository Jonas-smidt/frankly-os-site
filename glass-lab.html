<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frankly Lab · Glass Lab</title>
<style>
  :root{
    --burgundy: 45,0,17;
    --pink: 255,211,227;
    --edge: 1;               /* edge-light strength (0–1) */
    --scene:
      repeating-linear-gradient(0deg, rgba(255,255,255,.26) 0 1.4px, transparent 1.4px 46px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.26) 0 1.4px, transparent 1.4px 46px),
      radial-gradient(50vmax 50vmax at 16% 20%, #ff5fa2, transparent 55%),
      radial-gradient(48vmax 48vmax at 84% 16%, #7b5bff, transparent 55%),
      radial-gradient(54vmax 54vmax at 82% 84%, #17c3d6, transparent 55%),
      radial-gradient(48vmax 48vmax at 18% 86%, #ffb020, transparent 55%),
      radial-gradient(42vmax 42vmax at 50% 50%, #ff3d7f, transparent 62%),
      #180a2b;
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; color:#fff; overflow:hidden; height:100vh;
    display:grid; grid-template-columns:1fr 320px;
  }
  @media (max-width:820px){ body{ grid-template-columns:1fr; grid-template-rows:1fr auto; } }

  /* ---------- stage ---------- */
  .stage{ position:relative; overflow:hidden; display:grid; place-items:center; }
  .bg{ position:absolute; inset:0; z-index:0; background:var(--scene); background-size:100vw 100vh; }
  .brandmark{ position:absolute; inset:0; display:grid; place-items:center; z-index:0;
    font-weight:800; font-size:22vmin; letter-spacing:-.04em; color:rgba(255,255,255,.10); }

  .glass-wrap{ position:relative; width:340px; height:360px; border-radius:28px; z-index:2;
    transition:transform .45s cubic-bezier(.2,.9,.3,1.2); }
  .glass-wrap:hover{ transform:translateY(-6px); }
  .glass-card{
    position:absolute; inset:0; border-radius:28px; overflow:hidden;
    padding:28px; display:flex; flex-direction:column; justify-content:flex-end; background:transparent;
    box-shadow:
      0 30px 70px rgba(0,0,0,.5), 0 8px 22px rgba(0,0,0,.35),
      0 0 8px rgba(255,255,255, calc(.06 * var(--edge))),
      inset 0 0 0 1px rgba(255,255,255, calc(.9 * var(--edge))),
      inset 0 0 0 2px rgba(0,0,0, calc(.22 * var(--edge))),
      inset 0 0 0 4px rgba(255,255,255, calc(.22 * var(--edge))),
      inset 0 0 12px 3px rgba(255,255,255, calc(.08 * var(--edge)));
  }
  .glass-card .refract{ position:absolute; inset:0; z-index:0; pointer-events:none;
    background:var(--scene); background-size:100vw 100vh; background-repeat:no-repeat;
    filter:url(#glassDisplace) blur(5px) saturate(1.35) brightness(1.05); }
  .glass-card .tint{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:.5;
    background:
      linear-gradient(150deg, rgba(var(--pink),.14), rgba(var(--burgundy),.6) 46%, rgba(var(--burgundy),.85)),
      linear-gradient(rgba(255,255,255,.12), rgba(255,255,255,.12)); }
  .glass-card .flow{ position:absolute; inset:-80%; z-index:2; pointer-events:none; opacity:0; mix-blend-mode:screen;
    background:linear-gradient(var(--beam-angle,100deg),
      transparent 42%, rgba(255,70,60,.55) 46%, rgba(255,220,80,.60) 48%,
      rgba(120,255,150,.80) 50%, rgba(40,200,255,.90) 52%, rgba(150,90,255,.55) 55%, transparent 60%);
    filter:blur(9px) saturate(1.6) brightness(1.1); }
  .glass-card .kicker{ position:absolute; top:26px; left:28px; z-index:3;
    font-size:12px; letter-spacing:2px; text-transform:uppercase; color:rgba(var(--pink),.85); }
  .glass-card h3{ position:relative; z-index:3; font-size:22px; font-weight:600; }
  .glass-card p{ position:relative; z-index:3; font-size:14px; line-height:1.5; color:rgba(255,255,255,.72); margin-top:7px; }
  .glass-card::before{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none; z-index:4;
    padding:2.5px;
    background:linear-gradient(135deg,
      rgba(255,255,255, calc(1 * var(--edge))) 0%, rgba(255,255,255, calc(.35 * var(--edge))) 22%,
      transparent 46%, rgba(var(--pink), calc(.3 * var(--edge))) 66%,
      rgba(255,255,255, calc(.55 * var(--edge))) 88%, rgba(255,255,255, calc(1 * var(--edge))) 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    filter:blur(.6px) drop-shadow(0 0 3px rgba(255,255,255, calc(.35 * var(--edge)))); }

  /* ---------- control panel ---------- */
  .panel{ background:#140a12; border-left:1px solid rgba(255,255,255,.08);
    padding:22px 20px; overflow-y:auto; }
  @media (max-width:820px){ .panel{ border-left:0; border-top:1px solid rgba(255,255,255,.08); max-height:44vh; } }
  .panel h1{ font-size:16px; letter-spacing:.3px; }
  .panel .sub{ font-size:12px; color:rgba(255,255,255,.5); margin:4px 0 18px; }
  .ctrl{ margin-bottom:16px; }
  .ctrl label{ display:flex; justify-content:space-between; font-size:12.5px; color:rgba(255,255,255,.82);
    margin-bottom:7px; letter-spacing:.2px; }
  .ctrl label b{ color:#fff; font-variant-numeric:tabular-nums; font-weight:600; }
  input[type=range]{ -webkit-appearance:none; width:100%; height:4px; border-radius:4px;
    background:rgba(255,255,255,.16); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:#fff; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.4); }
  .seg{ display:flex; gap:6px; flex-wrap:wrap; }
  .seg button, .presets button{ flex:1; min-width:64px; padding:8px 6px; border-radius:9px; cursor:pointer;
    border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:rgba(255,255,255,.85);
    font-size:12px; transition:background .15s, border-color .15s; }
  .seg button.on{ background:rgba(255,211,227,.18); border-color:rgba(255,211,227,.5); color:#fff; }
  .seg button:hover, .presets button:hover{ background:rgba(255,255,255,.1); }
  .row2{ display:flex; align-items:center; justify-content:space-between; font-size:12.5px;
    color:rgba(255,255,255,.82); margin-bottom:16px; }
  .switch{ width:42px; height:24px; border-radius:24px; background:rgba(255,255,255,.16); position:relative; cursor:pointer; transition:background .2s; }
  .switch.on{ background:rgba(255,211,227,.7); }
  .switch i{ position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:left .2s; }
  .switch.on i{ left:21px; }
  .divider{ height:1px; background:rgba(255,255,255,.08); margin:20px 0 18px; }
  .plabel{ font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.45); margin-bottom:10px; }
  .presets{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .hint{ font-size:11px; color:rgba(255,255,255,.4); margin-top:16px; line-height:1.5; }
</style>
</head>
<body>
  <div class="stage">
    <div class="bg" id="bg"></div>
    <div class="brandmark">frankly</div>
    <div class="glass-wrap" id="wrap">
      <div class="glass-card" id="card">
        <div class="refract" id="refract"></div>
        <div class="tint" id="tint"></div>
        <div class="flow" id="flow"></div>
        <span class="kicker">Surface</span>
        <h3>Glass Lab</h3>
        <p>Leg med refraktion, frost, kant og lys — og find det glas I vil bruge.</p>
      </div>
    </div>
  </div>

  <aside class="panel">
    <h1>Glass Lab</h1>
    <div class="sub">Grafisk legeplads for Frankly glas-overflader</div>

    <div class="ctrl"><label>Distortion <b id="vDist">34</b></label>
      <input type="range" id="dist" min="0" max="80" value="34"></div>
    <div class="ctrl"><label>Bølgestørrelse <b id="vWave">8</b></label>
      <input type="range" id="wave" min="4" max="20" value="8"></div>
    <div class="ctrl"><label>Matt / frost <b id="vMatte">5</b></label>
      <input type="range" id="matte" min="0" max="16" value="5"></div>
    <div class="ctrl"><label>Kant-lys <b id="vEdge">100</b></label>
      <input type="range" id="edge" min="0" max="140" value="100"></div>
    <div class="ctrl"><label>Tint <b id="vTint">50</b></label>
      <input type="range" id="tintR" min="0" max="100" value="50"></div>

    <div class="row2"><span>Hover-wash (iriserende lys)</span>
      <div class="switch on" id="washSw"><i></i></div></div>

    <div class="ctrl"><label>Baggrund</label>
      <div class="seg" id="bgSeg">
        <button data-bg="grid" class="on">Gitter</button>
        <button data-bg="mesh">Mesh</button>
        <button data-bg="sunset">Sunset</button>
      </div></div>

    <div class="divider"></div>
    <div class="plabel">Presets</div>
    <div class="presets" id="presets">
      <button data-p="framer">Framer folder</button>
      <button data-p="frost">Frost-glas</button>
      <button data-p="lens">Klar linse</button>
      <button data-p="neon">Neon</button>
      <button data-p="bordeaux">Bordeaux</button>
      <button data-p="soft">Soft</button>
    </div>

    <div class="divider"></div>
    <button id="copyBtn" style="width:100%;padding:11px;border-radius:10px;cursor:pointer;
      border:1px solid rgba(255,211,227,.4); background:rgba(255,211,227,.12); color:#fff; font-size:13px; font-weight:600;">
      Kopiér CSS + indstillinger</button>
    <div class="hint">Før musen ind over kortet fra forskellige kanter — det iriserende lys skyller ind fra den side.</div>
  </aside>

  <svg width="0" height="0" style="position:absolute">
    <filter id="glassDisplace" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.008 0.009" numOctaves="2" seed="7" result="turb"/>
      <feDisplacementMap id="disp" in="SourceGraphic" in2="turb" scale="34" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

<script>
  const SCENES = {
    grid: `repeating-linear-gradient(0deg, rgba(255,255,255,.26) 0 1.4px, transparent 1.4px 46px),
           repeating-linear-gradient(90deg, rgba(255,255,255,.26) 0 1.4px, transparent 1.4px 46px),
           radial-gradient(50vmax 50vmax at 16% 20%, #ff5fa2, transparent 55%),
           radial-gradient(48vmax 48vmax at 84% 16%, #7b5bff, transparent 55%),
           radial-gradient(54vmax 54vmax at 82% 84%, #17c3d6, transparent 55%),
           radial-gradient(48vmax 48vmax at 18% 86%, #ffb020, transparent 55%),
           radial-gradient(42vmax 42vmax at 50% 50%, #ff3d7f, transparent 62%), #180a2b`,
    mesh:  `radial-gradient(60vmax 60vmax at 20% 25%, #ff4d8d, transparent 60%),
            radial-gradient(60vmax 60vmax at 80% 20%, #7b5bff, transparent 60%),
            radial-gradient(60vmax 60vmax at 75% 80%, #16d1c8, transparent 60%),
            radial-gradient(60vmax 60vmax at 25% 85%, #ffb020, transparent 60%), #1a0f2e`,
    sunset:`linear-gradient(180deg, #2a0a4a, #7a1f6a 40%, #ff5f6d 70%, #ffb56b 100%),
            repeating-linear-gradient(90deg, rgba(255,255,255,.10) 0 1px, transparent 1px 60px)`
  };

  const $ = id => document.getElementById(id);
  const card = $('card'), refract = $('refract'), flow = $('flow'), wrap = $('wrap');
  const disp = $('disp'), turb = $('turb');
  const state = { dist:34, wave:8, matte:5, edge:100, tint:50, wash:true, bg:'grid' };

  function applyScene(){
    const s = SCENES[state.bg];
    document.documentElement.style.setProperty('--scene', s);
    align();
  }
  function align(){
    const r = card.getBoundingClientRect();
    refract.style.backgroundPosition = (-r.left) + 'px ' + (-r.top) + 'px';
  }
  function render(){
    disp.setAttribute('scale', state.dist);
    const f = (state.wave/1000).toFixed(4);
    turb.setAttribute('baseFrequency', f + ' ' + (state.wave*1.12/1000).toFixed(4));
    refract.style.filter = `url(#glassDisplace) blur(${state.matte}px) saturate(1.35) brightness(1.05)`;
    card.style.setProperty('--edge', (state.edge/100).toFixed(2));
    $('tint').style.opacity = (state.tint/100).toFixed(2);
    $('vDist').textContent = state.dist;
    $('vWave').textContent = state.wave;
    $('vMatte').textContent = state.matte;
    $('vEdge').textContent = state.edge;
    $('vTint').textContent = state.tint;
  }

  // sliders
  const bind = (id, key) => $(id).addEventListener('input', e => { state[key] = +e.target.value; render(); });
  bind('dist','dist'); bind('wave','wave'); bind('matte','matte'); bind('edge','edge'); bind('tintR','tint');

  // wash toggle
  $('washSw').addEventListener('click', () => {
    state.wash = !state.wash; $('washSw').classList.toggle('on', state.wash);
  });

  // background segment
  $('bgSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if(!b) return;
    state.bg = b.dataset.bg;
    [...$('bgSeg').children].forEach(x => x.classList.toggle('on', x===b));
    applyScene();
  });

  // presets
  const PRESETS = {
    framer:  {dist:34,wave:8,matte:5,edge:100,tint:50,wash:true,bg:'grid'},
    frost:   {dist:22,wave:11,matte:12,edge:75,tint:60,wash:true,bg:'mesh'},
    lens:    {dist:58,wave:6,matte:1,edge:120,tint:28,wash:true,bg:'grid'},
    neon:    {dist:44,wave:7,matte:3,edge:130,tint:42,wash:true,bg:'sunset'},
    bordeaux:{dist:30,wave:9,matte:7,edge:90,tint:78,wash:true,bg:'mesh'},
    soft:    {dist:18,wave:12,matte:9,edge:60,tint:45,wash:false,bg:'grid'}
  };
  $('presets').addEventListener('click', e => {
    const b = e.target.closest('button'); if(!b) return;
    Object.assign(state, PRESETS[b.dataset.p]);
    // reflect to inputs
    $('dist').value=state.dist; $('wave').value=state.wave; $('matte').value=state.matte;
    $('edge').value=state.edge; $('tintR').value=state.tint;
    $('washSw').classList.toggle('on', state.wash);
    [...$('bgSeg').children].forEach(x => x.classList.toggle('on', x.dataset.bg===state.bg));
    applyScene(); render();
  });

  // hover wash — direction from where the cursor enters
  wrap.addEventListener('pointerenter', (e) => {
    if(!state.wash) return;
    const r = card.getBoundingClientRect();
    let dx=(r.left+r.width/2)-e.clientX, dy=(r.top+r.height/2)-e.clientY;
    const len=Math.hypot(dx,dy)||1; dx/=len; dy/=len;
    flow.style.setProperty('--beam-angle', (Math.atan2(dx,-dy)*180/Math.PI).toFixed(1)+'deg');
    const span=Math.hypot(r.width,r.height)*1.1;
    flow.animate([
      {transform:`translate(${-dx*span}px,${-dy*span}px)`,opacity:0},
      {opacity:1,offset:.2},{opacity:1,offset:.8},
      {transform:`translate(${dx*span}px,${dy*span}px)`,opacity:0}
    ],{duration:1050,easing:'cubic-bezier(.4,0,.2,1)'});
  });

  // copy the current settings as a ready-to-paste CSS + config snippet
  $('copyBtn').addEventListener('click', () => {
    const f = (state.wave/1000).toFixed(4), f2 = (state.wave*1.12/1000).toFixed(4);
    const snippet =
`/* Frankly Glass — Glass Lab export */
/* config: distortion ${state.dist} · wave ${state.wave} · matte ${state.matte}px · edge ${state.edge}% · tint ${state.tint}% · wash ${state.wash?'on':'off'} */

.frankly-glass .refract{
  filter: url(#glassDisplace) blur(${state.matte}px) saturate(1.35) brightness(1.05);
}
.frankly-glass .tint{ opacity: ${(state.tint/100).toFixed(2)}; }
.frankly-glass{ --edge: ${(state.edge/100).toFixed(2)}; }

<filter id="glassDisplace" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
  <feTurbulence type="fractalNoise" baseFrequency="${f} ${f2}" numOctaves="2" seed="7" result="turb"/>
  <feDisplacementMap in="SourceGraphic" in2="turb" scale="${state.dist}" xChannelSelector="R" yChannelSelector="G"/>
</filter>`;
    navigator.clipboard.writeText(snippet).then(() => {
      const b = $('copyBtn'), t = b.textContent;
      b.textContent = 'Kopieret ✓';
      setTimeout(() => { b.textContent = t; }, 1400);
    });
  });

  addEventListener('resize', align);
  applyScene(); render();
</script>
</body>
</html>
